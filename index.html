<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>Agenda Turma A — Escala 2x2</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Agenda A">
<link rel="apple-touch-icon" href="/apple-touch-icon-v2.png?v=3">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512-v2.png?v=3">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192-v2.png?v=3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{
  --bg:#0b0e14;
  --card:#1a1a1a;
  --card-2:#141414;
  --sidebar:#08090d;
  --border:#2a2a2a;
  --border-soft:#202020;
  --text:#e8edf5;
  --text-dim:#8b95a8;
  --text-mute:#5a6478;
  --neon:#00e676;
  --neon-soft:#00e67622;
  --orange:#f5a623;
  --orange-soft:#f5a62322;
  --purple:#7c3aed;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
}
[data-theme="light"]{
  --bg:#f4f6fb;
  --card:#ffffff;
  --card-2:#f8fafc;
  --sidebar:#ffffff;
  --border:#e2e8f0;
  --border-soft:#eef2f7;
  --text:#0f172a;
  --text-dim:#475569;
  --text-mute:#94a3b8;
  --neon:#008549;
  --neon-soft:#00854922;
  --orange:#d97706;
  --orange-soft:#d9770622;
  --purple:#7c3aed;
  --chip:#f1f5f9;
  --chip-hover:#e2e8f0;
}
:root,[data-theme="dark"]{
  --chip:#101218;
  --chip-hover:#15171d;
}
/* Sobrescritas pontuais no modo claro */
[data-theme="light"] .sb-icon{color:#64748b}
[data-theme="light"] .sb-icon:hover{background:var(--chip-hover);color:var(--text)}
[data-theme="light"] .sb-icon.active{background:var(--chip);color:var(--neon)}
/* Chat com colegas — modo claro */
[data-theme="light"] .chat-list{background:#f8fafc;border-color:#e2e8f0}
[data-theme="light"] .chat-list-head{color:#475569;background:#f1f5f9}
[data-theme="light"] .chat-conv{border-bottom-color:#e2e8f0;color:#0f172a}
[data-theme="light"] .chat-conv:hover{background:#e2e8f0}
[data-theme="light"] .chat-conv.active{background:#dcfce7;border-left:2px solid var(--neon);color:#0f172a}
[data-theme="light"] .chat-conv .av{background:#e2e8f0;color:#0f172a}
[data-theme="light"] .chat-conv .meta .nm{color:#0f172a}
[data-theme="light"] .chat-conv .meta .lst{color:#475569}
[data-theme="light"] .chat-conv .nlb{color:#fff}
[data-theme="light"] .chat-pane{background:#ffffff}
[data-theme="light"] .chat-head{background:#f8fafc;border-bottom-color:#e2e8f0;color:#0f172a}
[data-theme="light"] .chat-head .nm{color:#0f172a}
[data-theme="light"] .chat-head .sub{color:#64748b}
[data-theme="light"] .chat-msgs{background:#ffffff}
[data-theme="light"] .chat-msg{background:#f1f5f9;color:#0f172a;border:1px solid #e2e8f0}
[data-theme="light"] .chat-msg .au{color:#475569}
[data-theme="light"] .chat-msg .tx{color:#0f172a}
[data-theme="light"] .chat-msg .ts{color:#64748b}
[data-theme="light"] .chat-msg.mine{background:var(--neon);color:#ffffff;border-color:#00854955}
[data-theme="light"] .chat-msg.mine .au,[data-theme="light"] .chat-msg.mine .tx,[data-theme="light"] .chat-msg.mine .ts{color:#ffffff}
[data-theme="light"] .chat-input{background:#f8fafc;border-top-color:#e2e8f0}
[data-theme="light"] .chat-input textarea{background:#ffffff;color:#0f172a;border-color:#cbd5e1}
[data-theme="light"] .chat-empty{color:#64748b;background:#ffffff}
[data-theme="light"] .presence{border-color:#ffffff}
[data-theme="light"] .presence.off{background:#94a3b8}
[data-theme="light"] .tabs{background:var(--chip)}
[data-theme="light"] .tab.active{color:#fff;box-shadow:0 0 14px #00854955}
[data-theme="light"] .nav-arrow,[data-theme="light"] .btn-hoje{background:var(--card)}
[data-theme="light"] .mini-day{background:var(--chip)}
[data-theme="light"] .mini-day.folga{background:#00854922}
[data-theme="light"] .mini-day.trab{background:#d9770622}
[data-theme="light"] .status-icon{background:var(--chip)}
[data-theme="light"] .status-icon.folga{background:linear-gradient(135deg,#dcfce7,#bbf7d0);border-color:#00854955;color:#065f46}
[data-theme="light"] .status-icon.trab{background:linear-gradient(135deg,#ffedd5,#fed7aa);border-color:#d9770655;color:#9a3412}
[data-theme="light"] .resumo-cell{background:var(--chip)}
[data-theme="light"] .day{background:var(--card-2)}
[data-theme="light"] .day.folga{background:linear-gradient(160deg,#dcfce7,#f0fdf4);border-color:#00854955}
[data-theme="light"] .day.trab{background:linear-gradient(160deg,#ffedd5,#fff7ed);border-color:#d9770655}
[data-theme="light"] .day .num{color:var(--text)}
/* ===== VIRIATO LIGHT MODE ===== */
[data-theme="light"] .viriato-win{background:#ffffff;color:var(--text);border-color:#e2e8f0;box-shadow:0 24px 60px #0002, 0 0 0 1px #00854922}
[data-theme="light"] .vw-head{background:#f8fafc;border-bottom-color:#e2e8f0}
[data-theme="light"] .vw-name{color:#0f172a}
[data-theme="light"] .vw-sub{color:#64748b}
[data-theme="light"] .vw-close{color:#475569;border-color:#cbd5e1}
[data-theme="light"] .vw-close:hover{color:var(--neon);border-color:var(--neon);background:#f1f5f9}
[data-theme="light"] .vw-body{background:#ffffff}
[data-theme="light"] .vw-body::-webkit-scrollbar-thumb{background:#cbd5e1}
[data-theme="light"] .msg.bot{background:#ffffff;color:#0f172a;border:1px solid #cbd5e1;box-shadow:0 1px 2px #0f172a14}
[data-theme="light"] .msg.user{background:#1e40af;color:#ffffff;border:1px solid #1e3a8a}
[data-theme="light"] .msg.typing{color:#64748b;background:#f8fafc;border-color:#e2e8f0}
[data-theme="light"] .vw-input{background:#f8fafc;border-top-color:#e2e8f0}
[data-theme="light"] .vw-input input{background:#ffffff;color:#0f172a;border-color:#cbd5e1}
[data-theme="light"] .vw-input input::placeholder{color:#94a3b8}
[data-theme="light"] .vw-input input:focus{border-color:var(--neon)}
[data-theme="light"] .vw-send{background:var(--neon);color:#ffffff}
[data-theme="light"] .vw-send:hover{background:#006b3a}
[data-theme="light"] .vw-send:disabled{background:#e2e8f0;color:#94a3b8}
[data-theme="light"] .vw-plus{background:#ffffff !important;color:#0f172a !important;border-color:#cbd5e1 !important}
[data-theme="light"] .vw-plus:hover{background:#f1f5f9 !important}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  line-height:1.5;
  overflow:hidden;
}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
input,textarea{font-family:inherit;color:inherit}

/* ===== LAYOUT 3 COLUNAS ===== */
.app{display:grid;grid-template-columns:1fr 280px;height:100vh;width:100vw}

/* Sidebar (oculta — substituída pelo menu ⋮) */
.sidebar{display:none!important}

/* Menu FAB — Porta (no top-bar) */
.menu-fab{
  position:relative;
  width:38px;height:38px;border-radius:10px;
  background:var(--card-2);border:1px solid var(--border);
  color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,border-color .15s,color .15s;
}
.menu-fab svg{width:20px;height:20px}
.menu-fab:hover{border-color:var(--neon);color:var(--neon)}
.menu-fab.active{border-color:var(--neon);color:var(--neon);background:var(--chip)}
.menu-fab .menu-badge{
  position:absolute;top:-4px;right:-4px;
  background:#e23838;color:#fff;font-size:10px;font-weight:700;
  min-width:16px;height:16px;border-radius:8px;padding:0 4px;
  display:flex;align-items:center;justify-content:center;line-height:1;
  z-index:2;
}
.menu-pop{
  position:fixed;top:64px;right:14px;z-index:59;
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:8px;min-width:240px;
  box-shadow:0 14px 40px rgba(0,0,0,.45);
  display:none;flex-direction:column;gap:2px;
  transform-origin:top right;
  transform:scale(.85) translateY(-8px);opacity:0;
  transition:transform .22s cubic-bezier(.4,0,.2,1),opacity .18s;
}
.menu-pop.open{display:flex;animation:mp-in .25s cubic-bezier(.4,0,.2,1) forwards}
@keyframes mp-in{
  from{transform:scale(.85) translateY(-8px);opacity:0}
  to{transform:scale(1) translateY(0);opacity:1}
}
.menu-pop .mp-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 12px;border-radius:10px;
  background:transparent;border:none;color:var(--text);
  font-size:14px;font-weight:500;text-align:left;cursor:pointer;
  transition:background .12s,color .12s;width:100%;
  text-decoration:none;position:relative;
}
.menu-pop .mp-item:hover{background:var(--chip-hover);color:var(--neon)}
.menu-pop .mp-item.active{background:var(--chip);color:var(--neon)}
.menu-pop .mp-item svg{width:20px;height:20px;flex-shrink:0}
.menu-pop .mp-item img{width:24px;height:24px;border-radius:6px;object-fit:contain;flex-shrink:0}
.menu-pop .mp-divider{height:1px;background:var(--border);margin:4px 0}
.menu-pop .mp-badge{
  margin-left:auto;background:#e23838;color:#fff;font-size:10px;font-weight:700;
  min-width:18px;height:18px;border-radius:9px;padding:0 5px;
  display:flex;align-items:center;justify-content:center;line-height:1;
}
.menu-backdrop{position:fixed;inset:0;z-index:58;background:transparent;display:none}
.menu-backdrop.open{display:block}
.sb-logo{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--neon),#00b85a);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;margin-bottom:14px;
  box-shadow:0 4px 16px #00e67644;
}
.sb-icon{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-mute);
  transition:all .18s;
}
.sb-icon:hover{background:#15171d;color:var(--text)}
.sb-icon.active{background:#15171d;color:var(--neon)}
.sb-icon svg{width:20px;height:20px}
.sb-icon.sb-img{padding:4px}
.sb-icon.sb-img img{width:28px;height:28px;border-radius:6px;object-fit:contain;display:block}
.sb-icon{position:relative}
.sb-badge{position:absolute;top:2px;right:2px;background:#e23838;color:#fff;font-size:9px;font-weight:700;min-width:14px;height:14px;border-radius:7px;padding:0 4px;display:flex;align-items:center;justify-content:center;line-height:1}

/* Chat — layout WhatsApp-like, tela cheia */
body.sec-chat .main{padding:0!important;overflow:hidden!important;height:100dvh!important}
body.sec-chat #content{flex:1 1 0;min-height:0;display:flex;flex-direction:column}
.chat-wrap{display:grid;grid-template-columns:260px 1fr;grid-template-rows:100%;height:100%;min-height:0}
@media (max-width:720px){
  .chat-wrap{grid-template-columns:1fr}
  .chat-msgs{padding:14px;font-size:15px}
  .chat-msg{font-size:15px}
  .chat-input{padding:10px}
  .chat-input textarea{font-size:16px;min-height:54px}
  .chat-head{padding:10px 14px}
}
.chat-list{border-right:1px solid var(--border);overflow-y:auto;background:var(--sidebar)}
.chat-list-head{padding:14px 14px 8px;display:flex;justify-content:space-between;align-items:center;font-size:11px;letter-spacing:1.6px;color:var(--text-mute);text-transform:uppercase}
.chat-conv{padding:10px 14px;border-bottom:1px solid var(--border-soft);cursor:pointer;display:flex;gap:10px;align-items:center}
.chat-conv:hover{background:#15171d}
.chat-conv.active{background:#15171d;border-left:2px solid var(--neon)}
.chat-conv .av{width:36px;height:36px;border-radius:50%;background:var(--chip);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:var(--text);flex-shrink:0}
.presence{position:absolute;bottom:-2px;right:-2px;width:11px;height:11px;border-radius:50%;border:2px solid var(--sidebar);box-sizing:border-box}
.presence.on{background:#22c55e;box-shadow:0 0 6px #22c55e88}
.presence.off{background:#6b7280}
.chat-conv .meta{flex:1;min-width:0}
.chat-conv .meta .nm{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-conv .meta .lst{font-size:11px;color:var(--text-mute);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat-conv .nlb{background:var(--neon);color:#000;font-size:10px;font-weight:700;border-radius:10px;padding:2px 6px;min-width:18px;text-align:center}
.chat-pane{display:flex;flex-direction:column;min-width:0;min-height:0}
.chat-head{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.chat-head .nm{font-weight:600;font-size:14px}
.chat-head .sub{font-size:11px;color:var(--text-mute);margin-top:2px}
.chat-msgs{flex:1;min-height:0;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px;position:relative}
.chat-msgs::before{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:var(--border);opacity:.45;pointer-events:none}
.chat-msg{max-width:70%;padding:8px 12px;border-radius:14px;background:var(--chip);position:relative;word-wrap:break-word}
.chat-msg .au{font-size:10px;color:var(--text-mute);margin-bottom:3px;font-weight:600}
.chat-msg .tx{font-size:13px;line-height:1.5;white-space:pre-wrap}
.chat-msg .ts{font-size:9px;color:var(--text-mute);margin-top:4px;display:flex;gap:8px;align-items:center}
.chat-msg .star{cursor:pointer;font-size:13px;opacity:.4}
.chat-msg .star.on{opacity:1;color:#f5a623}
.chat-msg.mine{align-self:flex-end;background:var(--neon);color:#000}
.chat-msg.mine .au,.chat-msg.mine .ts{color:rgba(0,0,0,.55)}
.chat-msg .anx{margin-top:6px;padding:6px 10px;background:rgba(255,255,255,.08);border-radius:8px;font-size:11px;display:flex;align-items:center;gap:6px}
.chat-msg.mine .anx{background:rgba(0,0,0,.12)}
.chat-msg .anx a{color:inherit;text-decoration:underline}
.chat-msg img.anximg{max-width:100%;max-height:240px;border-radius:8px;margin-top:6px;display:block}
.chat-input{border-top:1px solid var(--border);padding:14px;display:flex;gap:10px;align-items:flex-end;flex-shrink:0;background:var(--card)}
.chat-input textarea{flex:1;background:#15171d;border:1px solid var(--border);border-radius:14px;padding:14px 16px;color:var(--text);font-family:inherit;font-size:16px;resize:none;min-height:54px;max-height:140px;line-height:1.4;outline:none;transition:border-color .15s}
.chat-input textarea:focus{border-color:var(--neon)}
.chat-input button{flex-shrink:0;min-height:48px;padding:0 16px;font-size:14px}
[data-theme="light"] .chat-input{background:#f8fafc}
.chat-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-mute);font-size:13px;text-align:center;padding:20px}

/* Main */
.main{
  overflow-y:auto;
  padding:28px 36px;
  display:flex;flex-direction:column;gap:22px;
}
.main::-webkit-scrollbar{width:8px}
.main::-webkit-scrollbar-thumb{background:#1d2030;border-radius:4px}

.top-bar{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px}
.brand-logo{
  height:44px;display:flex;align-items:center;justify-content:center;
}
.brand-logo img{height:38px;width:auto;display:block}
[data-theme="dark"] .brand-logo .logo-light,
[data-theme="light"] .brand-logo .logo-dark{display:none}
.theme-toggle{
  width:38px;height:38px;border-radius:10px;background:var(--card-2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text-dim);transition:all .15s;
}
.theme-toggle:hover{border-color:var(--neon);color:var(--neon)}
[data-theme="light"] .theme-toggle .ico-moon,
[data-theme="dark"] .theme-toggle .ico-sun{display:none}
.brand-tit{font-size:18px;font-weight:600;letter-spacing:.3px}
.brand-sub{font-family:var(--mono);font-size:10px;color:var(--text-mute);letter-spacing:2.4px;text-transform:uppercase;margin-top:2px}

.tabs{display:flex;gap:6px;background:#101218;border:1px solid var(--border);padding:5px;border-radius:999px}
.tab{
  font-family:var(--mono);font-size:11px;letter-spacing:2px;font-weight:600;
  padding:9px 22px;border-radius:999px;color:var(--text-dim);transition:all .18s;
}
.tab.active{background:var(--neon);color:#001a0c;box-shadow:0 0 18px #00e67655}

.month-bar{display:flex;align-items:center;justify-content:space-between;gap:12px}
.month-nav{display:flex;align-items:center;gap:14px}
.nav-arrow{
  width:38px;height:38px;border-radius:10px;background:#141414;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text-dim);transition:all .15s;
}
.nav-arrow:hover{border-color:var(--neon);color:var(--neon)}
.month-title{font-family:var(--mono);font-size:18px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;min-width:200px;text-align:center}
.btn-hoje{
  font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:2px;
  padding:9px 18px;border-radius:9px;background:#141414;border:1px solid var(--border);color:var(--text);
  transition:all .15s;
}
.btn-hoje:hover{border-color:var(--neon);color:var(--neon)}

/* Calendário mensal */
.cal-wrap{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px}
.week-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-top:14px}
.rx-bar{display:flex;flex-wrap:wrap;gap:6px;padding-top:8px;border-top:1px solid var(--border-soft)}
.rx-btn{display:inline-flex;align-items:center;gap:4px;background:var(--chip);border:1px solid var(--border);color:var(--text);border-radius:999px;padding:4px 10px;cursor:pointer;font-size:14px;line-height:1;transition:transform .12s,background .12s,border-color .12s}
.rx-btn:hover{transform:translateY(-1px);border-color:var(--neon)}
.rx-btn.on{background:rgba(245,197,66,.18);border-color:var(--neon);color:var(--neon)}
.rx-emo{font-size:16px}
.rx-cnt{font-size:11px;font-weight:700;font-family:var(--mono)}
[data-theme="light"] .rx-btn{background:#f1f5f9;border-color:#cbd5e1;color:#0f172a}
[data-theme="light"] .rx-btn.on{background:#fef3c7;border-color:#d97706;color:#92400e}
.week-tit{font-family:var(--mono);font-size:11px;letter-spacing:1.6px;color:var(--text-mute);font-weight:600;margin-bottom:10px}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.wk{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border-radius:10px;border:1px solid var(--border-soft);background:#15171d}
.wk .wd{font-family:var(--mono);font-size:9px;letter-spacing:1.2px;color:var(--text-mute);font-weight:600}
.wk .wn{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text)}
.wk .wl{font-family:var(--mono);font-size:8px;letter-spacing:1px;font-weight:700}
.wk.folga{border-color:#00e67655}
.wk.folga .wl{color:var(--neon)}
.wk.trab{border-color:#f5a62333}
.wk.trab .wl{color:var(--orange)}
.wk.today{outline:2px solid var(--neon);outline-offset:1px}
[data-theme="light"] .wk{background:#ffffff}
[data-theme="light"] .wk.folga{background:linear-gradient(160deg,#dcfce7,#f0fdf4)}
[data-theme="light"] .wk.trab{background:linear-gradient(160deg,#ffedd5,#fff7ed)}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:10px}
.cal-dow div{font-family:var(--mono);font-size:10px;color:var(--text-mute);letter-spacing:2px;text-align:center;padding:6px 0;text-transform:uppercase}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.day{
  background:var(--card-2);border:1px solid var(--border);border-radius:12px;
  padding:12px 10px;min-height:88px;display:flex;flex-direction:column;justify-content:space-between;
  transition:all .15s;position:relative;
}
.day.outside{opacity:.32}
.day .num{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--text)}
.day .lbl{font-family:var(--mono);font-size:9px;letter-spacing:1.6px;font-weight:600}
.day .evs{position:absolute;bottom:4px;left:0;right:0;display:flex;justify-content:center;gap:3px;flex-wrap:wrap;padding:0 3px;pointer-events:none}
.day .evs .evdot{width:6px;height:6px;border-radius:50%;display:inline-block}
.day{position:relative}
.day.fer{outline:2px solid #7c3aed66;outline-offset:-2px}
.day.folga{border-color:#00e67655;background:linear-gradient(160deg,#0d1f15,#0f1410)}
.day.folga .lbl{color:var(--neon)}
.day.trab{border-color:#f5a62333;background:linear-gradient(160deg,#1a1410,#15110d)}
.day.trab .lbl{color:var(--orange)}
.day.fer .num::after{content:"•";color:var(--purple);margin-left:4px;font-size:18px;line-height:0}
.day.today{
  border:2px solid var(--neon)!important;
  box-shadow:0 0 0 2px #00e67622, 0 0 28px #00e67666;
}

/* Visão anual */
.year-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.mini-mes{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
.mini-mes h4{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;text-align:center}
.mini-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.mini-dow span{font-family:var(--mono);font-size:8px;color:var(--text-mute);text-align:center}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.mini-day{
  aspect-ratio:1;border-radius:5px;font-family:var(--mono);font-size:9px;
  display:flex;align-items:center;justify-content:center;background:#101218;color:var(--text-mute);
}
.mini-day.folga{background:#00e6761f;color:var(--neon)}
.mini-day.trab{background:#f5a6231a;color:var(--orange)}
.mini-day.today{outline:1.5px solid var(--neon);outline-offset:1px}
.mini-day.outside{opacity:.18}

/* Painel direito */
.right{
  background:var(--sidebar);border-left:1px solid var(--border);overflow-y:auto;padding:22px 18px;
  display:flex;flex-direction:column;gap:18px;
}
.right::-webkit-scrollbar{width:6px}
.right::-webkit-scrollbar-thumb{background:#1d2030;border-radius:3px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.panel-tit{font-family:var(--mono);font-size:10px;letter-spacing:2.2px;color:var(--text-mute);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.panel-tit::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--neon)}

.status-row{display:flex;align-items:center;gap:14px}
.status-icon{
  width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;
  background:#101218;border:1px solid var(--border);
}
.status-icon.folga{background:linear-gradient(135deg,#0d1f15,#0a1a10);border-color:#00e67655;color:var(--neon)}
.status-icon.trab{background:linear-gradient(135deg,#1a1410,#13100a);border-color:#f5a62355;color:var(--orange)}
.status-tipo{font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:1.5px}
.status-tipo.folga{color:var(--neon)}
.status-tipo.trab{color:var(--orange)}
.status-data{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-top:3px;letter-spacing:.6px}

.event-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-soft)}
.event-row:last-child{border-bottom:none;padding-bottom:0}
.event-row:first-of-type{padding-top:0}
.ev-info{display:flex;flex-direction:column;gap:2px}
.ev-tipo{font-family:var(--mono);font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-mute)}
.ev-data{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text)}
.ev-count{font-family:var(--mono);font-size:18px;font-weight:600}
.ev-count.folga{color:var(--neon)}
.ev-count.trab{color:var(--orange)}
.ev-count small{font-size:9px;color:var(--text-mute);letter-spacing:1.5px;display:block;text-align:right;font-weight:400}

.resumo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.resumo-cell{background:#101218;border:1px solid var(--border-soft);border-radius:10px;padding:12px}
.resumo-cell .v{font-family:var(--mono);font-size:22px;font-weight:600}
.resumo-cell .l{font-family:var(--mono);font-size:9px;letter-spacing:1.8px;color:var(--text-mute);text-transform:uppercase;margin-top:4px}
.resumo-cell.f .v{color:var(--neon)}
.resumo-cell.t .v{color:var(--orange)}
.resumo-bar{margin-top:12px;height:6px;background:#101218;border-radius:3px;overflow:hidden;display:flex}
.resumo-bar .b-f{background:var(--neon)}
.resumo-bar .b-t{background:var(--orange)}
.resumo-leg{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--text-mute);margin-top:6px;letter-spacing:1px}

/* ===== VIRIATO TELA CHEIA (aba dedicada) ===== */
body.sec-viriato .main{padding:0!important;overflow:hidden!important;height:100dvh!important;gap:0!important}
body.sec-viriato .top-bar{display:none!important}
body.sec-viriato #content{flex:1 1 0;min-height:0;display:flex;flex-direction:column}
.viriato-full{
  display:flex;flex-direction:column;
  height:100%;min-height:0;
  background:var(--bg);overflow:hidden;
  border:none;border-radius:0;
}
.vf-head{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:linear-gradient(135deg,#7c3aed22,#00e67622);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.vf-back{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text);background:transparent;border:none;cursor:pointer}
.vf-back:hover{background:var(--chip)}
.vf-avatar{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#7c3aed,#00e676,#7c3aed);
  background-size:200% 200%;animation:viriatoGrad 4s ease infinite;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 4px 12px #7c3aed44;
}
.vf-name{font-weight:700;font-size:15px;letter-spacing:1px;color:var(--text)}
.vf-sub{font-size:11px;color:var(--text-mute);letter-spacing:.5px}
.vf-clear{width:40px;height:40px;border-radius:10px;background:transparent;border:none;cursor:pointer;font-size:18px}
.vf-clear:hover{background:var(--chip)}
.vf-body{
  flex:1 1 0;min-height:0;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  padding:18px 18px 24px;
  display:flex;flex-direction:column;gap:10px;
  background:var(--bg);position:relative;
}
.vf-body .msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-wrap:break-word;white-space:pre-wrap}
.vf-body .msg.bot{background:#1a1a1a;color:var(--neon);align-self:flex-start;border:1px solid #00e67622}
.vf-body .msg.user{background:#1f2840;color:#fff;align-self:flex-end}
.vf-body .msg.typing{color:var(--text-mute);font-style:italic}
.vf-input{
  display:flex;gap:10px;padding:14px 14px;
  border-top:1px solid var(--border);background:var(--card);flex-shrink:0;align-items:flex-end;
}
.vf-input textarea{
  flex:1;background:#15171d;border:1px solid var(--border);border-radius:14px;
  padding:14px 16px;font-size:16px;color:var(--text);outline:none;resize:none;
  font-family:inherit;line-height:1.4;min-height:54px;max-height:140px;
  transition:border-color .15s;
}
.vf-input textarea:focus{border-color:var(--neon)}
.vf-send{
  width:54px;height:54px;border-radius:14px;background:var(--neon);color:#001a0c;
  display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;
  border:none;cursor:pointer;flex-shrink:0;transition:transform .15s;
}
.vf-send:hover{transform:scale(1.05)}
.vf-send:active{transform:scale(.95)}
[data-theme="light"] .viriato-full{background:#ffffff;border-color:#e2e8f0}
[data-theme="light"] .vf-body{background:#f8fafc}
[data-theme="light"] .vf-body .msg.bot{background:#ffffff;color:#0f172a;border:1px solid #cbd5e1;box-shadow:0 1px 2px #0f172a14}
[data-theme="light"] .vf-body .msg.user{background:#1e40af;color:#fff;border:1px solid #1e3a8a}
[data-theme="light"] .vf-input{background:#f8fafc;border-top-color:#e2e8f0}
[data-theme="light"] .vf-input textarea{background:#ffffff;color:#0f172a;border-color:#cbd5e1}
[data-theme="light"] .vf-input textarea::placeholder{color:#94a3b8}
@media (max-width:720px){
  .vf-head{padding:12px}
  .vf-body{padding:14px}
  .vf-body .msg{font-size:15px;max-width:90%}
  .vf-input{padding:10px}
  .vf-input textarea{font-size:16px;min-height:58px;padding:14px 14px}
  .vf-send{width:58px;height:58px}
}

/* ===== VIRIATO BANNER (logo abaixo do calendario) ===== */
.viriato-banner{
  display:flex;align-items:center;gap:14px;
  padding:18px 20px;margin:18px 0 0;
  background:linear-gradient(135deg,#7c3aed22,#00e67622);
  border:1px solid #7c3aed44;border-radius:16px;
  font-size:17px;color:var(--text);
  position:relative;
}
.viriato-banner.hidden{display:none}
.vb-bot{
  width:52px;height:52px;min-width:52px;border-radius:50%;
  background:linear-gradient(135deg,#7c3aed,#00e676,#7c3aed);
  background-size:200% 200%;animation:viriatoGrad 4s ease infinite;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;color:#fff;flex-shrink:0;
  box-shadow:0 6px 18px #7c3aed55, 0 0 16px #00e67644;
  transition:transform .18s;cursor:pointer;
}
.vb-bot:hover{transform:scale(1.08)}
.vb-bot:active{transform:scale(.95)}
.vb-txt{flex:1;line-height:1.4;font-style:italic;color:var(--text)}
.vb-close{width:28px;height:28px;border-radius:8px;color:var(--text-mute);font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vb-close:hover{background:var(--chip);color:var(--text)}
[data-theme="light"] .viriato-banner{background:linear-gradient(135deg,#ede9fe,#dcfce7);border-color:#7c3aed55;color:#0f172a}
[data-theme="light"] .vb-txt{color:#0f172a}
/* esconde o FAB flutuante apenas quando estamos no chat ou ja na tela do viriato. */
body.sec-chat .viriato-fab,
body.sec-viriato .viriato-fab,
body.banner-visible .viriato-fab{display:none}
.viriato-fab.dragging{transition:none!important;cursor:grabbing!important;opacity:.92}
.viriato-fab{cursor:grab;touch-action:none}

/* ===== VIRIATO FAB ===== */
@keyframes viriatoGrad{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.viriato-fab{
  position:fixed;bottom:24px;right:24px;z-index:90;
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#7c3aed,#00e676,#7c3aed);
  background-size:200% 200%;
  animation:viriatoGrad 4s ease infinite;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;color:#fff;
  box-shadow:0 8px 28px #7c3aed55, 0 0 24px #00e67644;
  transition:transform .18s;
}
.viriato-fab:hover{transform:scale(1.08)}
.viriato-fab:active{transform:scale(.95)}

@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.viriato-win{
  position:fixed;bottom:92px;right:24px;z-index:91;
  width:320px;height:480px;
  background:#0e1117;border:1px solid var(--border);border-radius:16px;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 24px 60px #000c, 0 0 0 1px #00e67622;
  animation:slideUp .22s ease;
}
.vw-head{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-bottom:1px solid var(--border);
  background:#0a0c11;
}
.vw-avatar{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,#7c3aed,#00e676);
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
.vw-name{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:1.2px}
.vw-sub{font-size:10px;color:var(--text-mute);margin-top:1px}
.vw-close{
  margin-left:auto;width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;color:var(--text-dim);
  border:1px solid var(--border);
}
.vw-close:hover{color:var(--neon);border-color:var(--neon)}

.vw-body{
  flex:1 1 0;min-height:0;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  padding:14px 14px 20px;display:flex;flex-direction:column;gap:10px;
}
.vw-body::-webkit-scrollbar{width:5px}
.vw-body::-webkit-scrollbar-thumb{background:#1d2030;border-radius:3px}
.msg{padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.45;max-width:85%;word-wrap:break-word;white-space:pre-wrap}
.msg.bot{background:#1a1a1a;color:var(--neon);align-self:flex-start;border:1px solid #00e67622}
.msg.user{background:#1f2840;color:#fff;align-self:flex-end}
.msg.typing{color:var(--text-mute);font-style:italic}

.vw-input{
  display:flex;gap:10px;padding:14px 14px;border-top:1px solid var(--border);background:#0a0c11;
  flex-shrink:0;align-items:center;
}
.vw-input input{
  flex:1;background:#15171d;border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;font-size:16px;color:var(--text);outline:none;transition:border-color .15s;
  height:52px;
}
.vw-input input:focus{border-color:var(--neon)}
.vw-send{
  width:38px;height:38px;border-radius:10px;background:var(--neon);color:#001a0c;
  display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;
  transition:all .15s;
}
.vw-send:hover{background:#22ee88}
.vw-send:disabled{background:#1d2030;color:var(--text-mute);cursor:not-allowed}

/* ===== SPLASH (minimalista) ===== */
@keyframes splashFade{to{opacity:0;visibility:hidden}}
@keyframes splashRise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.splash{
  position:fixed;inset:0;z-index:9999;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  animation:splashFade .6s ease 2.6s forwards;
}
.splash .logo{height:72px;width:auto;animation:splashRise .7s ease both}
.splash .title{
  font-family:var(--sans);font-size:30px;font-weight:300;letter-spacing:1px;
  color:#fff;animation:splashRise .7s ease .15s both;
}
.splash .credit{
  position:absolute;bottom:28px;left:0;right:0;text-align:center;
  font-family:var(--sans);font-size:12px;font-weight:300;color:#888;
  letter-spacing:.4px;font-style:italic;
  animation:splashRise .7s ease .3s both;
}
.splash .credit b{font-weight:500;font-style:normal;color:#fff}

/* responsivo */
@media (max-width:1100px){
  .app{grid-template-columns:1fr}
  .right{display:none}
}
@media (max-width:720px){
  .app{grid-template-columns:1fr;height:100vh}
  .sidebar{
    display:flex;flex-direction:row;align-items:center;justify-content:space-between;
    width:100%;height:84px;padding:8px 6px;gap:2px;
    border-top:1px solid var(--border);border-right:none;
    position:fixed;bottom:0;left:0;right:0;z-index:50;
    box-sizing:border-box;
  }
  .sb-logo{display:none}
  .sb-icon{flex:1 1 0;min-width:0;width:auto;height:64px;min-height:64px;border-radius:14px;padding:0}
  .sb-icon svg{width:32px;height:32px}
  .sb-icon.sb-img img{width:42px;height:42px}
  .sb-badge{font-size:11px;min-width:18px;height:18px;border-radius:9px}
  .main{padding:14px;overflow-y:auto}
  .year-wrap{grid-template-columns:1fr}
  .viriato-fab{bottom:24px;right:14px;left:auto;transform:none;width:64px;height:64px;font-size:30px}
  .viriato-fab:hover{transform:scale(1.08)}
  .viriato-fab:active{transform:scale(.95)}
  .viriato-win{right:8px;left:8px;width:auto;top:64px;bottom:96px;height:auto;max-height:none}
  .viriato-win .vw-body{flex:1;min-height:0}
  .viriato-win .vw-input input{height:54px;font-size:17px;padding:14px 16px}
  .viriato-win .vw-send{width:54px;height:54px;font-size:20px}
  .viriato-win .vw-input{padding:14px 14px;gap:10px}
  .top-bar{flex-wrap:wrap;gap:8px}
  .month-title{min-width:0;font-size:15px}
  .cal-dow,.cal-grid{gap:4px}
  .day{padding:6px 4px;min-height:62px}
  .day .num{font-size:14px}
  .day .lbl{font-size:8px;letter-spacing:1px}
  .chat-wrap{grid-template-columns:1fr}
  .chat-list.hide-mobile{display:none}
  .chat-pane.hide-mobile{display:none}
  .resumo-grid{grid-template-columns:1fr}
}
</style>
</head>

  <div class="title">Agenda Turma A</div>

</div>

    </button>
    <button class="mp-item" data-sec="chat" role="menuitem">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M16 17h-6l-4 3v-3H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/><path d="M8 11h8a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H10l-4 3v-3"/></svg>
      <span>Chat</span>
      <span id="chatBadge" class="mp-badge" style="display:none"></span>
    </button>
    <button class="mp-item" data-sec="acervo" role="menuitem">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M4 4h6a3 3 0 0 1 3 3v13a2 2 0 0 0-2-2H4z"/><path d="M20 4h-6a3 3 0 0 0-3 3v13a2 2 0 0 1 2-2h7z"/></svg>
      <span>Acervo</span>

<script>
console.log("%c[Agenda Turma A] Build: 2026-04-28 v3.5 (sem splash duplicada do iOS)", "background:#00e676;color:#001a0c;padding:3px 8px;border-radius:6px;font-weight:700");
// ===== Constantes =====
const FER={"2026-01-01":"Confraternizacao Universal","2026-04-03":"Paixao de Cristo","2026-04-05":"Pascoa","2026-04-21":"Tiradentes","2026-05-01":"Dia do Trabalho","2026-06-04":"Corpus Christi","2026-09-07":"Independencia do Brasil","2026-10-12":"N.Sra.Aparecida","2026-11-02":"Finados","2026-11-15":"Proclamacao da Republica","2026-11-20":"Consciencia Negra","2026-12-25":"Natal"};
const MESES=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const MESES3=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const DOW=["DOM","SEG","TER","QUA","QUI","SEX","SAB"];
const EVENTO_TIPOS={
  aniversario:{emoji:"🎂",label:"Aniversário",cor:"#ec4899",rec:true},
  medico:     {emoji:"🏥",label:"Médico",     cor:"#ef4444"},
  viagem:     {emoji:"✈️",label:"Viagem",     cor:"#3b82f6"},
  compromisso:{emoji:"📋",label:"Compromisso",cor:"#14b8a6"},
  hora_extra: {emoji:"⏰",label:"Hora Extra", cor:"#fbbf24"},
  outro:      {emoji:"⭐",label:"Outro",      cor:"#94a3b8"}
};
function evTipoInfo(t){return EVENTO_TIPOS[t]||EVENTO_TIPOS.outro;}
let EVENTOS_CACHE=[];
let EVENTOS_PESS_CACHE=[];
async function carregarEventosCache(){
  try{const r=await apiFetch("/api/mem/eventos");const d=await r.json();EVENTOS_CACHE=d.eventos||[];}catch(e){EVENTOS_CACHE=[];}
  try{const r=await apiFetch("/api/eventos-pessoais");const d=await r.json();EVENTOS_PESS_CACHE=(d.eventos||[]).map(e=>Object.assign({},e,{_pessoal:true}));}catch(e){EVENTOS_PESS_CACHE=[];}
}
function eventosNoDia(k){
  // k = "YYYY-MM-DD" — junta mural + pessoais
  const [a,m,d]=k.split("-");
  const mmdd=`${m}-${d}`;
  const filtra=e=>{
    if(!e.data)return false;
    if(e.data===k)return true;
    if(e.tipo==="aniversario"&&e.data.slice(5)===mmdd)return true;
    return false;
  };
  return EVENTOS_CACHE.filter(filtra).concat(EVENTOS_PESS_CACHE.filter(filtra));
}
const DOW_FULL=["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];
const DOW_MINI=["D","S","T","Q","Q","S","S"];

// REF: 22/04/2026 = 1º dia de TRABALHO do par. Ciclo: trab,trab,folga,folga (2x2).
const REF=new Date(2026,3,22);
function toKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function isFolga(d){
  const dt=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=Math.round((dt-REF)/86400000);
  return ((diff%4)+4)%4>=2;
}

const HOJE=new Date();
const HOJE_KEY=toKey(HOJE);

// ===== Estado + LocalStorage =====
const LS_KEY="turmaA_pierre_state";
const S={
  view:"mensal",
  curMes:HOJE.getMonth(),
  curAno:HOJE.getFullYear(),
  viriatoOpen:false,
  history:[],
};
function saveLS(){
  try{
    localStorage.setItem(LS_KEY,JSON.stringify({
      view:S.view,curMes:S.curMes,curAno:S.curAno
    }));
  }catch(e){}
}
function loadLS(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return;
    const d=JSON.parse(raw);
    if(d.view)S.view=d.view;
    if(typeof d.curMes==="number")S.curMes=d.curMes;
    if(typeof d.curAno==="number")S.curAno=d.curAno;
  }catch(e){}
}
loadLS();

// ===== Cálculos =====
function diffDias(de,ate){
  const a=new Date(de.getFullYear(),de.getMonth(),de.getDate());
  const b=new Date(ate.getFullYear(),ate.getMonth(),ate.getDate());
  return Math.round((b-a)/86400000);
}
function proxData(predicate){
  for(let i=0;i<60;i++){
    const d=new Date(HOJE);d.setDate(d.getDate()+i);
    if(predicate(d))return d;
  }
  return null;
}
function calcResumoAnual(ano){
  let f=0,t=0;
  for(let m=0;m<12;m++){
    const max=new Date(ano,m+1,0).getDate();
    for(let d=1;d<=max;d++){
      const dt=new Date(ano,m,d);
      if(isFolga(dt))f++;else t++;
    }
  }
  return{f,t,total:f+t};
}

// ===== Render Mensal =====
function renderMensal(){
  const ano=S.curAno,mes=S.curMes;
  const primeiro=new Date(ano,mes,1);
  const startOffset=primeiro.getDay();
  const diasMes=new Date(ano,mes+1,0).getDate();
  const diasMesAnt=new Date(ano,mes,0).getDate();

  let html=`
    <div class="month-bar">
      <div class="month-nav">
        <button class="nav-arrow" id="prevMes" aria-label="Mês anterior">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="month-title">${MESES[mes]} ${ano}</div>
        <button class="nav-arrow" id="nextMes" aria-label="Próximo mês">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <button class="btn-hoje" id="btnHoje">HOJE</button>
    </div>
    <div class="cal-wrap">
      <div class="cal-dow">${DOW.map(d=>`<div>${d}</div>`).join("")}</div>
      <div class="cal-grid">`;

  // dias mês anterior
  for(let i=startOffset-1;i>=0;i--){
    const dnum=diasMesAnt-i;
    const dt=new Date(ano,mes-1,dnum);
    const fol=isFolga(dt);
    html+=`<div class="day outside ${fol?"folga":"trab"}"><span class="num">${dnum}</span><span class="lbl">${fol?"FOLGA":"TRAB"}</span></div>`;
  }
  // dias mês atual
  for(let d=1;d<=diasMes;d++){
    const dt=new Date(ano,mes,d);
    const k=toKey(dt);
    const fol=isFolga(dt);
    const today=k===HOJE_KEY;
    const fer=FER[k]?"fer":"";
    const ferNome=FER[k]||"";
    const evs=eventosNoDia(k);
    const evDots=evs.length?`<span class="evs">${evs.slice(0,5).map(e=>`<span class="evdot" style="background:${evTipoInfo(e.tipo).cor}" title="${escapeHtml(evTipoInfo(e.tipo).label)}: ${escapeHtml(e.titulo||"")}"></span>`).join("")}</span>`:"";
    const titParts=[ferNome,...evs.map(e=>`${evTipoInfo(e.tipo).emoji} ${e.titulo||""}`)].filter(Boolean);
    html+=`<div class="day ${fol?"folga":"trab"} ${today?"today":""} ${fer}" data-k="${k}" role="button" tabindex="0" title="${escapeHtml(titParts.join(" • "))}"><span class="num">${d}</span><span class="lbl">${fol?"FOLGA":"TRAB"}</span>${evDots}</div>`;
  }
  // completar grid
  const total=startOffset+diasMes;
  const resto=(7-(total%7))%7;
  for(let i=1;i<=resto;i++){
    const dt=new Date(ano,mes+1,i);
    const fol=isFolga(dt);
    html+=`<div class="day outside ${fol?"folga":"trab"}"><span class="num">${i}</span><span class="lbl">${fol?"FOLGA":"TRAB"}</span></div>`;
  }
  html+=`</div></div>`;
  // Caixa "ESTA SEMANA" — 7 dias da semana corrente
  {
    const dow=HOJE.getDay();
    const ws=new Date(HOJE);ws.setDate(HOJE.getDate()-dow);
    let wk=`<div class="week-box"><div class="week-tit">ESTA SEMANA</div><div class="week-grid">`;
    for(let i=0;i<7;i++){
      const dt=new Date(ws);dt.setDate(ws.getDate()+i);
      const fol=isFolga(dt);
      const today=toKey(dt)===HOJE_KEY;
      wk+=`<div class="wk ${fol?"folga":"trab"} ${today?"today":""}"><span class="wd">${DOW[i]}</span><span class="wn">${dt.getDate()}</span><span class="wl">${fol?"FOLGA":"TRAB"}</span></div>`;
    }
    wk+=`</div></div>`;
    html+=wk;
  }
  // Banner reflexivo do Viriato (logo abaixo do calendario, com botao integrado)
  html+=`<div class="viriato-banner" id="viriatoBanner">
    <button class="vb-bot" id="vbOpenViriato" aria-label="Abrir Viriato" title="Falar com o Viriato">🤖</button>
    <span class="vb-txt"><i>Vc Já viu como é Linda a Vista da Lagoa Mapaúra, pela Janela de Uma Locomotiva?</i></span>
    <button class="vb-close" id="vbClose" aria-label="Fechar">×</button>
  </div>`;
  return html;
}

// ===== Render Anual =====
function renderAnual(){
  const ano=S.curAno;
  let html=`<div class="month-bar">
    <div class="month-nav">
      <button class="nav-arrow" id="prevAno" aria-label="Ano anterior">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="month-title">${ano}</div>
      <button class="nav-arrow" id="nextAno" aria-label="Próximo ano">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <button class="btn-hoje" id="btnHoje">HOJE</button>
  </div><div class="year-wrap">`;
  for(let m=0;m<12;m++){
    const primeiro=new Date(ano,m,1);
    const offset=primeiro.getDay();
    const dias=new Date(ano,m+1,0).getDate();
    let cells="";
    for(let i=0;i<offset;i++)cells+=`<div class="mini-day outside"></div>`;
    for(let d=1;d<=dias;d++){
      const dt=new Date(ano,m,d);
      const k=toKey(dt);
      const fol=isFolga(dt);
      const today=k===HOJE_KEY?"today":"";
      cells+=`<div class="mini-day ${fol?"folga":"trab"} ${today}" data-k="${k}" role="button" tabindex="0">${d}</div>`;
    }
    html+=`<div class="mini-mes">
      <h4>${MESES3[m]}</h4>
      <div class="mini-dow">${DOW_MINI.map(x=>`<span>${x}</span>`).join("")}</div>
      <div class="mini-grid">${cells}</div>
    </div>`;
  }
  html+=`</div>`;
  return html;
}

// ===== Render Painel direito =====
function renderRight(){
  const fol=isFolga(HOJE);
  const dataStr=HOJE.getDate().toString().padStart(2,"0")+" "+MESES3[HOJE.getMonth()]+" "+HOJE.getFullYear();
  const dow=DOW_FULL[HOJE.getDay()];
  // Próximo dia de trabalho/folga (a partir de amanhã)
  const proxTrabReal=proxData(d=>toKey(d)!==HOJE_KEY && !isFolga(d));
  const proxFolga=proxData(d=>toKey(d)!==HOJE_KEY && isFolga(d));

  const ptDias=proxTrabReal?diffDias(HOJE,proxTrabReal):0;
  const pfDias=proxFolga?diffDias(HOJE,proxFolga):0;

  const resumo=calcResumoAnual(S.curAno);
  const pctF=Math.round(resumo.f/resumo.total*100);
  const pctT=100-pctF;

  return `
    <div class="panel">
      <div class="panel-tit">Status Hoje</div>
      <div class="status-row">
        <div class="status-icon ${fol?"folga":"trab"}">${fol?"🌙":"☀️"}</div>
        <div>
          <div class="status-tipo ${fol?"folga":"trab"}">${fol?"FOLGA":"TRABALHO"}</div>
          <div class="status-data">${dow} · ${dataStr}</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-tit">Próximos Eventos</div>
      <div class="event-row">
        <div class="ev-info">
          <span class="ev-tipo">Próx. Trabalho</span>
          <span class="ev-data">${proxTrabReal?proxTrabReal.getDate().toString().padStart(2,"0")+" "+MESES3[proxTrabReal.getMonth()]:"—"}</span>
        </div>
        <div class="ev-count trab">${ptDias}<small>DIAS</small></div>
      </div>
      <div class="event-row">
        <div class="ev-info">
          <span class="ev-tipo">Próx. Folga</span>
          <span class="ev-data">${proxFolga?proxFolga.getDate().toString().padStart(2,"0")+" "+MESES3[proxFolga.getMonth()]:"—"}</span>
        </div>
        <div class="ev-count folga">${pfDias}<small>DIAS</small></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-tit">Resumo ${S.curAno}</div>
      <div class="resumo-grid">
        <div class="resumo-cell t"><div class="v">${resumo.t}</div><div class="l">Trabalho</div></div>
        <div class="resumo-cell f"><div class="v">${resumo.f}</div><div class="l">Folga</div></div>
      </div>
      <div class="resumo-bar">
        <div class="b-t" style="width:${pctT}%"></div>
        <div class="b-f" style="width:${pctF}%"></div>
      </div>
      <div class="resumo-leg">
        <span>${pctT}% TRAB</span>
        <span>TOTAL ${resumo.total}</span>
        <span>${pctF}% FOLGA</span>
      </div>
    </div>
  `;
}

// ===== Render geral =====
function render(){
  const c=document.getElementById("content");
  if(S.section && S.section!=="calendario"){
    document.getElementById("rightPanel").style.display="none";
    if(S.section==="eventos")renderEventos(c);
    else if(S.section==="pessoais")renderPessoais(c);
    else if(S.section==="diario")renderDiario(c);
    else if(S.section==="acervo")renderAcervo(c);
    else if(S.section==="chat")renderChat(c);
    else if(S.section==="viriato")renderViriatoFull(c);
    return;
  }
  document.getElementById("rightPanel").style.display="";
  c.innerHTML=S.view==="mensal"?renderMensal():renderAnual();
  document.getElementById("rightPanel").innerHTML=renderRight();
  attachViriatoBanner();
  if(CURRENT_USER){
    carregarEventosCache().then(()=>{
      if(S.section==="calendario"||!S.section){
        const c2=document.getElementById("content");
        if(c2)c2.innerHTML=S.view==="mensal"?renderMensal():renderAnual();
        bindCalNav();
        attachViriatoBanner();
      }
    });
  }

  // tabs
  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.toggle("active",t.dataset.view===S.view);
  });

  bindCalNav();
}
function bindCalNav(){
  const pm=document.getElementById("prevMes");
  if(pm)pm.onclick=()=>{S.curMes--;if(S.curMes<0){S.curMes=11;S.curAno--;}saveLS();render();};
  const nm=document.getElementById("nextMes");
  if(nm)nm.onclick=()=>{S.curMes++;if(S.curMes>11){S.curMes=0;S.curAno++;}saveLS();render();};
  const pa=document.getElementById("prevAno");
  if(pa)pa.onclick=()=>{S.curAno--;saveLS();render();};
  const na=document.getElementById("nextAno");
  if(na)na.onclick=()=>{S.curAno++;saveLS();render();};
  const bh=document.getElementById("btnHoje");
  if(bh)bh.onclick=()=>{S.curMes=HOJE.getMonth();S.curAno=HOJE.getFullYear();saveLS();render();};
  document.querySelectorAll(".mini-day[data-k],.day[data-k]").forEach(d=>{
    d.style.cursor="pointer";
    d.onclick=()=>openDia(d.dataset.k);
    d.onkeydown=(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();openDia(d.dataset.k);}};
  });
}

document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click",()=>{
    S.view=t.dataset.view;S.section="calendario";
    document.querySelectorAll(".mp-item[data-sec]").forEach(b=>b.classList.toggle("active",b.dataset.sec==="calendario"));
    saveLS();render();
  });
});

// ===== Tema claro/escuro =====
function applyTheme(t){
  document.documentElement.setAttribute("data-theme",t);
  try{localStorage.setItem("turmaA_theme",t);}catch(e){}
}
applyTheme(localStorage.getItem("turmaA_theme")||"dark");
document.getElementById("themeToggle").addEventListener("click",()=>{
  const cur=document.documentElement.getAttribute("data-theme")||"dark";
  applyTheme(cur==="dark"?"light":"dark");
});
// Banner reflexivo do Viriato — attach handlers a cada render do calendario
function attachViriatoBanner(){
  const banner=document.getElementById("viriatoBanner");
  if(!banner){document.body.classList.remove("banner-visible");return;}

// ===== FAB do Viriato: clicavel + arrastavel =====
(function(){
  const fab=document.getElementById("viriatoBtn");
  if(!fab)return;
  // Aplica posicao salva
  function applySavedPos(){
    try{
      const raw=localStorage.getItem("turmaA_fabPos");
      if(!raw)return;
      const p=JSON.parse(raw);
      if(typeof p.left==="number"&&typeof p.top==="number"){
        const m=44;
        const maxL=window.innerWidth-fab.offsetWidth-8;
        const maxT=window.innerHeight-fab.offsetHeight-8;
        const L=Math.min(Math.max(8,p.left),maxL);
        const T=Math.min(Math.max(8,p.top),maxT);
        fab.style.left=L+"px";
        fab.style.top=T+"px";
        fab.style.right="auto";
        fab.style.bottom="auto";
        fab.style.transform="none";
      }
    }catch(e){}
  }
  applySavedPos();
  window.addEventListener("resize",applySavedPos);

  let dragging=false, moved=false, startX=0, startY=0, origL=0, origT=0;
  const TH=6; // px threshold para considerar drag

  fab.addEventListener("pointerdown",(e)=>{
    if(e.button!==undefined&&e.button!==0)return;
    dragging=true;moved=false;
    const r=fab.getBoundingClientRect();
    origL=r.left;origT=r.top;
    startX=e.clientX;startY=e.clientY;
    fab.setPointerCapture&&fab.setPointerCapture(e.pointerId);
    fab.classList.add("dragging");
  });
  fab.addEventListener("pointermove",(e)=>{
    if(!dragging)return;
    const dx=e.clientX-startX, dy=e.clientY-startY;
    if(!moved && (Math.abs(dx)>TH||Math.abs(dy)>TH))moved=true;
    if(moved){
      const w=fab.offsetWidth, h=fab.offsetHeight;
      let L=origL+dx, T=origT+dy;
      L=Math.min(Math.max(8,L),window.innerWidth-w-8);
      T=Math.min(Math.max(8,T),window.innerHeight-h-8);
      fab.style.left=L+"px";
      fab.style.top=T+"px";
      fab.style.right="auto";
      fab.style.bottom="auto";
      fab.style.transform="none";
    }
  });
  function endDrag(e){
    if(!dragging)return;
    dragging=false;
    fab.classList.remove("dragging");
    try{fab.releasePointerCapture&&fab.releasePointerCapture(e.pointerId);}catch(_){}
    if(moved){
      const r=fab.getBoundingClientRect();
      try{localStorage.setItem("turmaA_fabPos",JSON.stringify({left:r.left,top:r.top}));}catch(_){}
    }else{
      // clique real - abre Viriato em tela dedicada
      setSection("viriato");
    }
    moved=false;
  }
  fab.addEventListener("pointerup",endDrag);
  fab.addEventListener("pointercancel",endDrag);
  // bloqueia o click sintetico apos drag (alguns navegadores)
  fab.addEventListener("click",(e)=>{if(moved){e.preventDefault();e.stopPropagation();}});
})();

function showToast(msg,ms=3500){

// ----- auth helpers -----
function getToken(){return localStorage.getItem("turmaA_authToken")||"";}
function setToken(t){if(t)localStorage.setItem("turmaA_authToken",t);else localStorage.removeItem("turmaA_authToken");}
let CURRENT_USER=null;
const REACTION_EMOJIS=["👍","❤️","😂","😮","🎉","🙏","👏","🚂"];
async function apiFetch(path,opts={}){
  const headers=Object.assign({},opts.headers||{});
  const t=getToken();
  if(t)headers["Authorization"]="Bearer "+t;
  if(opts.body && !headers["Content-Type"])headers["Content-Type"]="application/json";
  const r=await fetch(path,Object.assign({},opts,{headers}));
  if(r.status===401){setToken("");CURRENT_USER=null;openLogin();throw new Error("auth");}
  return r;
}
async function loadMe(){
  if(!getToken())return null;
  try{
    const r=await fetch("/api/auth/me",{headers:{"Authorization":"Bearer "+getToken()}});
    if(r.ok){
      const d=await r.json();
      if(d && d.authenticated===false){setToken("");CURRENT_USER=null;return null;}
      CURRENT_USER=d.user||d;return CURRENT_USER;
    }
  }catch(e){}
  setToken("");CURRENT_USER=null;return null;
}

async function requireAuth(){

}

async function renderEventos(c){
  c.innerHTML=`<div class="pg-head"><div class="pg-tit">📋 MURAL DA TURMA</div><button id="evNew" class="btn-primary">+ NOVO POST</button></div><div class="pg-body" id="evBody"><div style="color:var(--muted)">Carregando...</div></div>`;
  document.getElementById("evNew").onclick=()=>openEventoForm();
  if(!await requireAuth()){document.getElementById("evBody").innerHTML='<div style="color:var(--muted);padding:20px;text-align:center">Faça login para ver os eventos.</div>';return;}
  try{
    const r=await apiFetch("/api/mem/eventos");
    const d=await r.json();
    const evs=(d.eventos||[]).slice().sort((a,b)=>(Number(b.id)||0)-(Number(a.id)||0));
    const body=document.getElementById("evBody");
    if(!evs.length){body.innerHTML='<div style="color:var(--muted);padding:20px;text-align:center">Nenhum evento ainda. Clique em + NOVO EVENTO.</div>';return;}
    const meuMat=CURRENT_USER&&CURRENT_USER.matricula;
    body.innerHTML=evs.map(e=>{
      const reac=e.reacoes||{};
      const barra=REACTION_EMOJIS.map(emo=>{

// ===== DIARIO DE BORDO (privado, com câmera/galeria/arquivo) =====
async function _compressImage(file, maxDim=1280, quality=0.7){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width, h=img.height;
      if(w>maxDim || h>maxDim){
        if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}
        else{w=Math.round(w*maxDim/h);h=maxDim;}
      }
      const cv=document.createElement("canvas");
      cv.width=w;cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      cv.toBlob(blob=>{
        if(!blob){reject(new Error("Falha ao comprimir"));return;}
        const r=new FileReader();
        r.onload=()=>resolve({b64:r.result.split(",")[1],mimetype:"image/jpeg",size:blob.size});
        r.readAsDataURL(blob);
      },"image/jpeg",quality);
    };
    img.onerror=()=>reject(new Error("Imagem inválida"));
    img.src=URL.createObjectURL(file);
  });
}
async function _fileToB64(file){
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res({b64:r.result.split(",")[1],mimetype:file.type||"application/octet-stream",size:file.size});r.onerror=rej;r.readAsDataURL(file);});
}
function _formatBytes(n){if(n<1024)return n+" B";if(n<1024*1024)return (n/1024).toFixed(0)+" KB";return (n/1024/1024).toFixed(1)+" MB";}
function _isImage(mt){return (mt||"").startsWith("image/");}
function _brDate(s){if(!s)return"";const [a,m,d]=s.split("-");return `${d}/${m}/${a}`;}

function openDiarioForm(dataPre){
  let pendentes=[]; // {nome, mimetype, b64, size}
  openModal("Nova Entrada do Diário 📓",`
    <div style="font-size:12px;color:var(--neon);margin-bottom:10px;padding:8px 10px;background:rgba(0,230,118,.10);border-radius:8px">🔒 Privado — só você vê esta entrada.</div>
    <div class="modal-fld"><label>Data</label><input id="diData" type="date" value="${dataPre||new Date().toISOString().slice(0,10)}"/></div>
    <div class="modal-fld"><label>O que aconteceu?</label><textarea id="diTxt" rows="5" placeholder="Ex.: Manobra do trem 1234, problema na chave 7..."></textarea></div>
    <div style="margin-bottom:10px">
      <div style="font-size:12px;color:var(--text-mute);margin-bottom:6px">Anexos (fotos, prints, PDFs)</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
        <button type="button" id="diCam" class="btn-secondary" style="font-size:12px;padding:10px 4px">📷 Câmera</button>
        <button type="button" id="diImg" class="btn-secondary" style="font-size:12px;padding:10px 4px">🖼️ Galeria</button>
        <button type="button" id="diArq" class="btn-secondary" style="font-size:12px;padding:10px 4px">📎 Arquivo</button>
      </div>
      <input type="file" id="diInpCam" accept="image/*" capture="environment" style="display:none"/>
      <input type="file" id="diInpImg" accept="image/*" multiple style="display:none"/>
      <input type="file" id="diInpArq" accept=".pdf,.txt,.doc,.docx" multiple style="display:none"/>
      <div id="diPrev" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px"></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button id="diSave" class="btn-primary">SALVAR</button>
    </div>
  `,()=>{
    const prev=document.getElementById("diPrev");
    function redrawPrev(){
      if(!pendentes.length){prev.innerHTML="";return;}
      prev.innerHTML=pendentes.map((a,i)=>{
        const thumb=_isImage(a.mimetype)
          ?`<img src="data:${a.mimetype};base64,${a.b64}" style="width:64px;height:64px;object-fit:cover;border-radius:6px"/>`
          :`<div style="width:64px;height:64px;display:flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);border-radius:6px;font-size:24px">📄</div>`;
        return `<div style="position:relative">${thumb}
          <button data-i="${i}" class="rmAnx" style="position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:#ff5555;color:#fff;border:none;cursor:pointer;font-size:14px;line-height:1">×</button>
          <div style="font-size:9px;color:var(--muted);text-align:center;margin-top:2px">${_formatBytes(a.size)}</div>
        </div>`;
      }).join("");
      prev.querySelectorAll(".rmAnx").forEach(b=>b.onclick=()=>{pendentes.splice(Number(b.dataset.i),1);redrawPrev();});
    }
    async function adicionar(file, comprimir){
      try{
        const a = comprimir && _isImage(file.type)
          ? await _compressImage(file)
          : await _fileToB64(file);
        a.nome = file.name || (comprimir?"foto.jpg":"arquivo");
        if(a.size > 8*1024*1024){showToast("❌ Arquivo grande demais ("+_formatBytes(a.size)+", máx 8 MB)");return;}
        pendentes.push(a);
        redrawPrev();
      }catch(e){showToast("❌ Falha ao processar: "+e.message);}
    }
    const inpCam=document.getElementById("diInpCam");
    const inpImg=document.getElementById("diInpImg");
    const inpArq=document.getElementById("diInpArq");
    document.getElementById("diCam").onclick=()=>inpCam.click();
    document.getElementById("diImg").onclick=()=>inpImg.click();
    document.getElementById("diArq").onclick=()=>inpArq.click();
    inpCam.onchange=async()=>{for(const f of inpCam.files)await adicionar(f,true);inpCam.value="";};
    inpImg.onchange=async()=>{for(const f of inpImg.files)await adicionar(f,true);inpImg.value="";};
    inpArq.onchange=async()=>{for(const f of inpArq.files)await adicionar(f,false);inpArq.value="";};
    document.getElementById("diSave").onclick=async()=>{
      const data=document.getElementById("diData").value;
      const texto=document.getElementById("diTxt").value.trim();
      if(!data){showToast("Data é obrigatória");return;}
      if(!texto && !pendentes.length){showToast("Escreva algo ou anexe um arquivo");return;}
      const novaEntrada={id:Date.now(),data,texto,anexos:pendentes};
      const r=await apiFetch("/api/diario");
      const d=await r.json();
      const novos=(d.entradas||[]).concat([novaEntrada]);
      const r2=await apiFetch("/api/diario",{method:"POST",body:JSON.stringify({entradas:novos})});
      if(r2.ok){closeModal();showToast("📓 Entrada salva");if(S.section==="diario")renderDiario(document.getElementById("content"));}
      else{const dd=await r2.json().catch(()=>({}));showToast("❌ "+(dd.error||"Falha ao salvar"));}
    };
  });
}

let CHAT_CONV=null, CHAT_POLL=null, CHAT_LAST_TS=0;

function avatarFor(nome){return (nome||"?").trim().split(/\s+/).slice(0,2).map(s=>s[0]||"").join("").toUpperCase()||"?";}
function _relTime(ts){const s=Math.max(0,Math.floor(Date.now()/1000-ts));if(s<60)return"agora";if(s<3600)return"há "+Math.floor(s/60)+"min";if(s<86400)return"há "+Math.floor(s/3600)+"h";return"há "+Math.floor(s/86400)+"d";}

async function drawChatList(){

  const totUnread=convs.reduce((s,c)=>s+(c.nao_lidas||0),0);

  // mapeia matricula -> conversa 1a1 existente

    if(c.tipo!=="grupo" && (c.participantes||[]).length===2){

        </div>`;
      }).join(""):'<div style="padding:14px;color:var(--muted);font-size:12px;text-align:center">Nenhuma conversa ainda.<br/>Toque num colega abaixo pra começar.</div>'}</div>

        const sub=u.online?"online agora":(u.last_seen?"visto "+_relTime(u.last_seen):"offline");
        return `<div class="chat-conv" data-mat="${escapeHtml(u.matricula)}" title="Conversar com ${escapeHtml(u.nome)}">

        </div>`;
      }).join(""):'<div style="padding:14px;color:var(--muted);font-size:12px;text-align:center">Nenhum colega aprovado ainda.</div>'}</div>
    </div>
    <div class="chat-pane" id="chatPane">
      ${CHAT_CONV?"":'<div class="chat-empty">Toque numa conversa ou num colega à esquerda.</div>'}
    </div>`;
  document.getElementById("newConv").onclick=openNovaConversa;

  document.querySelectorAll(".chat-conv[data-mat]").forEach(el=>{
    el.onclick=async()=>{

      }catch(e){}

  });
  if(CHAT_CONV){const cur=convs.find(x=>x.id===CHAT_CONV.id);if(cur){CHAT_CONV=cur;await abrirConversa(cur,true);}}

function _isMobileChat(){return window.matchMedia("(max-width:720px)").matches;}
function _showChatPane(){const list=document.querySelector(".chat-list"),pane=document.getElementById("chatPane");if(!list||!pane)return;if(_isMobileChat()){list.classList.add("hide-mobile");pane.classList.remove("hide-mobile");}else{list.classList.remove("hide-mobile");pane.classList.remove("hide-mobile");}}
function _showChatList(){const list=document.querySelector(".chat-list"),pane=document.getElementById("chatPane");if(!list||!pane)return;if(_isMobileChat()){list.classList.remove("hide-mobile");pane.classList.add("hide-mobile");}else{list.classList.remove("hide-mobile");pane.classList.remove("hide-mobile");}}
async function abrirConversa(c,jaListou){
  CHAT_CONV=c;CHAT_LAST_TS=0;
  if(!jaListou){document.querySelectorAll(".chat-conv").forEach(el=>el.classList.toggle("active",el.dataset.id===c.id));}
  const pane=document.getElementById("chatPane");

const CHAT_ANEXO_CACHE={};
async function _loadAnexoBlob(cid,mid){
  const k=cid+"/"+mid;
  if(CHAT_ANEXO_CACHE[k])return CHAT_ANEXO_CACHE[k];
  try{
    const r=await apiFetch("/api/chat/conversa/"+cid+"/anexo/"+mid);
    if(!r.ok)return null;
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    CHAT_ANEXO_CACHE[k]=url;return url;
  }catch(e){return null;}
}
async function _hydrateAnexos(cid,box){
  box.querySelectorAll("[data-anx-mid]").forEach(async el=>{
    const mid=el.dataset.anxMid;const url=await _loadAnexoBlob(cid,mid);if(!url)return;
    if(el.tagName==="IMG"){el.src=url;}
    else{const a=el.querySelector("a");if(a){a.href=url;a.removeAttribute("data-pending");}}
  });
}
async function carregarMsgs(scroll,force){
  if(!CHAT_CONV)return;
  try{
    const r=await apiFetch("/api/chat/conversa/"+CHAT_CONV.id+"/mensagens");
    const msgs=(await r.json()).mensagens||[];
    const top=msgs[msgs.length-1];
    const newTs=top?top.ts:0;
    if(newTs===CHAT_LAST_TS && !scroll && !force)return;
    CHAT_LAST_TS=newTs;
    const box=document.getElementById("chatMsgs");if(!box)return;
    const me=CURRENT_USER&&CURRENT_USER.matricula;
    box.innerHTML=msgs.length?msgs.map(m=>{
      const mine=m.autor_mat===me;
      const dt=new Date((m.ts||0)*1000);
      const hh=dt.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
      const dd=dt.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});
      let anexoHtml="";
      if(m.anexo&&m.anexo.tem){
        const isImg=(m.anexo.mimetype||"").startsWith("image/");
        anexoHtml=isImg
          ? `<img class="anximg" data-anx-mid="${m.id}" alt="${escapeHtml(m.anexo.nome)}"/>`
          : `<div class="anx" data-anx-mid="${m.id}">📎 <a href="#" data-pending="1" download="${escapeHtml(m.anexo.nome)}" target="_blank">${escapeHtml(m.anexo.nome)}</a></div>`;
      }
      return `<div class="chat-msg ${mine?"mine":""}">
        ${!mine&&CHAT_CONV.tipo==="grupo"?`<div class="au">${escapeHtml(m.autor_nome||"")}</div>`:""}
        ${m.texto?`<div class="tx">${escapeHtml(m.texto)}</div>`:""}
        ${anexoHtml}
        <div class="ts"><span>${dd} ${hh}</span><span class="star ${m.importante?"on":""}" data-mid="${m.id}" title="${m.importante?"Importante (mantém)":"Marcar como importante"}">★</span></div>
      </div>`;
    }).join(""):'<div style="color:var(--muted);text-align:center;padding:20px">Sem mensagens. Diga oi 👋</div>';
    box.querySelectorAll(".star").forEach(s=>{s.onclick=async()=>{await apiFetch("/api/chat/mensagem/"+CHAT_CONV.id+"/"+s.dataset.mid+"/importante",{method:"POST"});carregarMsgs(true,true);};});
    _hydrateAnexos(CHAT_CONV.id,box);
    if(scroll)box.scrollTop=box.scrollHeight;
    await apiFetch("/api/chat/conversa/"+CHAT_CONV.id+"/lida",{method:"POST"}).catch(()=>{});
    refreshChatBadge();
  }catch(e){if(e.message==="auth")_stopChatPoll();}
}
async function enviarMsg(){
  const ta=document.getElementById("chatTxt");if(!ta)return;
  const t=ta.value.trim();if(!t)return;
  ta.value="";
  await apiFetch("/api/chat/conversa/"+CHAT_CONV.id+"/mensagem",{method:"POST",body:JSON.stringify({texto:t})});
  await carregarMsgs(true);await drawChatList();
}
async function enviarComAnexo(){
  const fi=document.getElementById("chatFile");const f=fi.files&&fi.files[0];if(!f)return;
  if(f.size>50*1024*1024){showToast("Anexo > 50MB");fi.value="";return;}
  const ta=document.getElementById("chatTxt");const t=ta?ta.value.trim():"";
  showToast("Enviando "+f.name+"...");
  const b64=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.readAsDataURL(f);});
  const r=await apiFetch("/api/chat/conversa/"+CHAT_CONV.id+"/mensagem",{method:"POST",body:JSON.stringify({texto:t,anexo:{nome:f.name,mimetype:f.type,data:b64}})});
  if(r.ok){if(ta)ta.value="";fi.value="";await carregarMsgs(true);await drawChatList();}
  else{const d=await r.json();showToast("❌ "+(d.error||"Falha"));}
}

function uploadDoc(isTemp){
  const inp=document.createElement("input");inp.type="file";inp.accept=".pdf,.docx,.txt";
  inp.onchange=async()=>{
    const f=inp.files&&inp.files[0];if(!f)return;
    if(f.size>50*1024*1024){showToast("Arquivo > 50MB");return;}
    showToast("Enviando "+f.name+"...");
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(f);});
    try{
      const r=await apiFetch("/api/biblioteca/upload",{method:"POST",body:JSON.stringify({nome:f.name,data:b64,mimetype:f.type,temp:isTemp})});
      const d=await r.json();
      if(r.ok){showToast("✅ "+f.name+" ("+d.chunks+" trechos)");if(S.section==="acervo")render();}
      else showToast("❌ "+(d.error||"falhou"));
    }catch(e){if(e.message!=="auth")showToast("Erro: "+e.message);}
  };
  inp.click();
}
