<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Agenda Turma A — Escala 2x2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{
  --bg:#0b0e14;
  --card:#1a1a1a;
  --card-2:#141414;
  --sidebar:#08090d;
  --border:#2a2a2a;
  --border-soft:#202020;
  --text:#e8edf5;
  --text-dim:#8b95a8;
  --text-mute:#5a6478;
  --neon:#00e676;
  --neon-soft:#00e67622;
  --orange:#f5a623;
  --orange-soft:#f5a62322;
  --purple:#7c3aed;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
}
[data-theme="light"]{
  --bg:#f4f6fb;
  --card:#ffffff;
  --card-2:#f8fafc;
  --sidebar:#ffffff;
  --border:#e2e8f0;
  --border-soft:#eef2f7;
  --text:#0f172a;
  --text-dim:#475569;
  --text-mute:#94a3b8;
  --neon:#008549;
  --neon-soft:#00854922;
  --orange:#d97706;
  --orange-soft:#d9770622;
  --purple:#7c3aed;
  --chip:#f1f5f9;
  --chip-hover:#e2e8f0;
}
:root,[data-theme="dark"]{
  --chip:#101218;
  --chip-hover:#15171d;
}
/* Sobrescritas pontuais no modo claro */
[data-theme="light"] .sb-icon{color:#64748b}
[data-theme="light"] .sb-icon:hover{background:var(--chip-hover);color:var(--text)}
[data-theme="light"] .sb-icon.active{background:var(--chip);color:var(--neon)}
[data-theme="light"] .tabs{background:var(--chip)}
[data-theme="light"] .tab.active{color:#fff;box-shadow:0 0 14px #00854955}
[data-theme="light"] .nav-arrow,[data-theme="light"] .btn-hoje{background:var(--card)}
[data-theme="light"] .mini-day{background:var(--chip)}
[data-theme="light"] .mini-day.folga{background:#00854922}
[data-theme="light"] .mini-day.trab{background:#d9770622}
[data-theme="light"] .status-icon{background:var(--chip)}
[data-theme="light"] .status-icon.folga{background:linear-gradient(135deg,#dcfce7,#bbf7d0);border-color:#00854955;color:#065f46}
[data-theme="light"] .status-icon.trab{background:linear-gradient(135deg,#ffedd5,#fed7aa);border-color:#d9770655;color:#9a3412}
[data-theme="light"] .resumo-cell{background:var(--chip)}
[data-theme="light"] .day{background:var(--card-2)}
[data-theme="light"] .day.folga{background:linear-gradient(160deg,#dcfce7,#f0fdf4);border-color:#00854955}
[data-theme="light"] .day.trab{background:linear-gradient(160deg,#ffedd5,#fff7ed);border-color:#d9770655}
[data-theme="light"] .day .num{color:var(--text)}
[data-theme="light"] .msg.bot{background:var(--card);color:var(--neon);border-color:#00854933}
[data-theme="light"] .vw-msg.bot{background:var(--chip);color:var(--text)}
[data-theme="light"] .vw-msg.user{background:var(--neon);color:#fff}
[data-theme="light"] .viriato-win{background:var(--card);color:var(--text)}
[data-theme="light"] .vw-input{background:var(--chip);color:var(--text);border-color:var(--border)}
[data-theme="light"] .vw-send{color:#fff}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  line-height:1.5;
  overflow:hidden;
}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
input,textarea{font-family:inherit;color:inherit}

/* ===== LAYOUT 3 COLUNAS ===== */
.app{display:grid;grid-template-columns:60px 1fr 280px;height:100vh;width:100vw}

/* Sidebar */
.sidebar{
  background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:18px 0;gap:8px;
}
.sb-logo{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--neon),#00b85a);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;margin-bottom:14px;
  box-shadow:0 4px 16px #00e67644;
}
.sb-icon{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-mute);
  transition:all .18s;
}
.sb-icon:hover{background:#15171d;color:var(--text)}
.sb-icon.active{background:#15171d;color:var(--neon)}
.sb-icon svg{width:20px;height:20px}

/* Main */
.main{
  overflow-y:auto;
  padding:28px 36px;
  display:flex;flex-direction:column;gap:22px;
}
.main::-webkit-scrollbar{width:8px}
.main::-webkit-scrollbar-thumb{background:#1d2030;border-radius:4px}

.top-bar{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px}
.brand-logo{
  height:44px;display:flex;align-items:center;justify-content:center;
}
.brand-logo img{height:38px;width:auto;display:block}
[data-theme="dark"] .brand-logo .logo-light,
[data-theme="light"] .brand-logo .logo-dark{display:none}
.theme-toggle{
  width:38px;height:38px;border-radius:10px;background:var(--card-2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text-dim);transition:all .15s;
}
.theme-toggle:hover{border-color:var(--neon);color:var(--neon)}
[data-theme="light"] .theme-toggle .ico-moon,
[data-theme="dark"] .theme-toggle .ico-sun{display:none}
.brand-tit{font-size:18px;font-weight:600;letter-spacing:.3px}
.brand-sub{font-family:var(--mono);font-size:10px;color:var(--text-mute);letter-spacing:2.4px;text-transform:uppercase;margin-top:2px}

.tabs{display:flex;gap:6px;background:#101218;border:1px solid var(--border);padding:5px;border-radius:999px}
.tab{
  font-family:var(--mono);font-size:11px;letter-spacing:2px;font-weight:600;
  padding:9px 22px;border-radius:999px;color:var(--text-dim);transition:all .18s;
}
.tab.active{background:var(--neon);color:#001a0c;box-shadow:0 0 18px #00e67655}

.month-bar{display:flex;align-items:center;justify-content:space-between;gap:12px}
.month-nav{display:flex;align-items:center;gap:14px}
.nav-arrow{
  width:38px;height:38px;border-radius:10px;background:#141414;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text-dim);transition:all .15s;
}
.nav-arrow:hover{border-color:var(--neon);color:var(--neon)}
.month-title{font-family:var(--mono);font-size:18px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;min-width:200px;text-align:center}
.btn-hoje{
  font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:2px;
  padding:9px 18px;border-radius:9px;background:#141414;border:1px solid var(--border);color:var(--text);
  transition:all .15s;
}
.btn-hoje:hover{border-color:var(--neon);color:var(--neon)}

/* Calendário mensal */
.cal-wrap{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:10px}
.cal-dow div{font-family:var(--mono);font-size:10px;color:var(--text-mute);letter-spacing:2px;text-align:center;padding:6px 0;text-transform:uppercase}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.day{
  background:var(--card-2);border:1px solid var(--border);border-radius:12px;
  padding:12px 10px;min-height:88px;display:flex;flex-direction:column;justify-content:space-between;
  transition:all .15s;position:relative;
}
.day.outside{opacity:.32}
.day .num{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--text)}
.day .lbl{font-family:var(--mono);font-size:9px;letter-spacing:1.6px;font-weight:600}
.day.folga{border-color:#00e67655;background:linear-gradient(160deg,#0d1f15,#0f1410)}
.day.folga .lbl{color:var(--neon)}
.day.trab{border-color:#f5a62333;background:linear-gradient(160deg,#1a1410,#15110d)}
.day.trab .lbl{color:var(--orange)}
.day.fer .num::after{content:"•";color:var(--purple);margin-left:4px}
.day.today{
  border:2px solid var(--neon)!important;
  box-shadow:0 0 0 2px #00e67622, 0 0 28px #00e67666;
}

/* Visão anual */
.year-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.mini-mes{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
.mini-mes h4{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;text-align:center}
.mini-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.mini-dow span{font-family:var(--mono);font-size:8px;color:var(--text-mute);text-align:center}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.mini-day{
  aspect-ratio:1;border-radius:5px;font-family:var(--mono);font-size:9px;
  display:flex;align-items:center;justify-content:center;background:#101218;color:var(--text-mute);
}
.mini-day.folga{background:#00e6761f;color:var(--neon)}
.mini-day.trab{background:#f5a6231a;color:var(--orange)}
.mini-day.today{outline:1.5px solid var(--neon);outline-offset:1px}
.mini-day.outside{opacity:.18}

/* Painel direito */
.right{
  background:var(--sidebar);border-left:1px solid var(--border);overflow-y:auto;padding:22px 18px;
  display:flex;flex-direction:column;gap:18px;
}
.right::-webkit-scrollbar{width:6px}
.right::-webkit-scrollbar-thumb{background:#1d2030;border-radius:3px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.panel-tit{font-family:var(--mono);font-size:10px;letter-spacing:2.2px;color:var(--text-mute);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.panel-tit::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--neon)}

.status-row{display:flex;align-items:center;gap:14px}
.status-icon{
  width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;
  background:#101218;border:1px solid var(--border);
}
.status-icon.folga{background:linear-gradient(135deg,#0d1f15,#0a1a10);border-color:#00e67655;color:var(--neon)}
.status-icon.trab{background:linear-gradient(135deg,#1a1410,#13100a);border-color:#f5a62355;color:var(--orange)}
.status-tipo{font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:1.5px}
.status-tipo.folga{color:var(--neon)}
.status-tipo.trab{color:var(--orange)}
.status-data{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-top:3px;letter-spacing:.6px}

.event-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-soft)}
.event-row:last-child{border-bottom:none;padding-bottom:0}
.event-row:first-of-type{padding-top:0}
.ev-info{display:flex;flex-direction:column;gap:2px}
.ev-tipo{font-family:var(--mono);font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-mute)}
.ev-data{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text)}
.ev-count{font-family:var(--mono);font-size:18px;font-weight:600}
.ev-count.folga{color:var(--neon)}
.ev-count.trab{color:var(--orange)}
.ev-count small{font-size:9px;color:var(--text-mute);letter-spacing:1.5px;display:block;text-align:right;font-weight:400}

.resumo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.resumo-cell{background:#101218;border:1px solid var(--border-soft);border-radius:10px;padding:12px}
.resumo-cell .v{font-family:var(--mono);font-size:22px;font-weight:600}
.resumo-cell .l{font-family:var(--mono);font-size:9px;letter-spacing:1.8px;color:var(--text-mute);text-transform:uppercase;margin-top:4px}
.resumo-cell.f .v{color:var(--neon)}
.resumo-cell.t .v{color:var(--orange)}
.resumo-bar{margin-top:12px;height:6px;background:#101218;border-radius:3px;overflow:hidden;display:flex}
.resumo-bar .b-f{background:var(--neon)}
.resumo-bar .b-t{background:var(--orange)}
.resumo-leg{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--text-mute);margin-top:6px;letter-spacing:1px}

/* ===== VIRIATO FAB ===== */
@keyframes viriatoGrad{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.viriato-fab{
  position:fixed;bottom:24px;right:24px;z-index:90;
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#7c3aed,#00e676,#7c3aed);
  background-size:200% 200%;
  animation:viriatoGrad 4s ease infinite;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;color:#fff;
  box-shadow:0 8px 28px #7c3aed55, 0 0 24px #00e67644;
  transition:transform .18s;
}
.viriato-fab:hover{transform:scale(1.08)}
.viriato-fab:active{transform:scale(.95)}

@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.viriato-win{
  position:fixed;bottom:92px;right:24px;z-index:91;
  width:320px;height:480px;
  background:#0e1117;border:1px solid var(--border);border-radius:16px;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 24px 60px #000c, 0 0 0 1px #00e67622;
  animation:slideUp .22s ease;
}
.vw-head{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-bottom:1px solid var(--border);
  background:#0a0c11;
}
.vw-avatar{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,#7c3aed,#00e676);
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
.vw-name{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:1.2px}
.vw-sub{font-size:10px;color:var(--text-mute);margin-top:1px}
.vw-close{
  margin-left:auto;width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;color:var(--text-dim);
  border:1px solid var(--border);
}
.vw-close:hover{color:var(--neon);border-color:var(--neon)}

.vw-body{
  flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;
}
.vw-body::-webkit-scrollbar{width:5px}
.vw-body::-webkit-scrollbar-thumb{background:#1d2030;border-radius:3px}
.msg{padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.45;max-width:85%;word-wrap:break-word;white-space:pre-wrap}
.msg.bot{background:#1a1a1a;color:var(--neon);align-self:flex-start;border:1px solid #00e67622}
.msg.user{background:#1f2840;color:#fff;align-self:flex-end}
.msg.typing{color:var(--text-mute);font-style:italic}

.vw-input{
  display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);background:#0a0c11;
}
.vw-input input{
  flex:1;background:#15171d;border:1px solid var(--border);border-radius:10px;
  padding:9px 12px;font-size:13px;color:var(--text);outline:none;transition:border-color .15s;
}
.vw-input input:focus{border-color:var(--neon)}
.vw-send{
  width:38px;height:38px;border-radius:10px;background:var(--neon);color:#001a0c;
  display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;
  transition:all .15s;
}
.vw-send:hover{background:#22ee88}
.vw-send:disabled{background:#1d2030;color:var(--text-mute);cursor:not-allowed}

/* ===== SPLASH (minimalista) ===== */
@keyframes splashFade{to{opacity:0;visibility:hidden}}
@keyframes splashRise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.splash{
  position:fixed;inset:0;z-index:9999;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  animation:splashFade .6s ease 2.6s forwards;
}
.splash .logo{height:72px;width:auto;animation:splashRise .7s ease both}
.splash .title{
  font-family:var(--sans);font-size:30px;font-weight:300;letter-spacing:1px;
  color:#fff;animation:splashRise .7s ease .15s both;
}
.splash .credit{
  position:absolute;bottom:28px;left:0;right:0;text-align:center;
  font-family:var(--sans);font-size:12px;font-weight:300;color:#888;
  letter-spacing:.4px;font-style:italic;
  animation:splashRise .7s ease .3s both;
}
.splash .credit b{font-weight:500;font-style:normal;color:#fff}

/* responsivo */
@media (max-width:1100px){
  .app{grid-template-columns:60px 1fr}
  .right{display:none}
}
@media (max-width:720px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .main{padding:18px}
  .year-wrap{grid-template-columns:repeat(2,1fr)}
  .viriato-win{right:12px;left:12px;width:auto}
}
</style>
</head>
<body>
<!-- Splash minimalista -->
<div class="splash" id="splash">
  <img class="logo" src="/vale_symbol_color.png" alt="Vale"/>
  <div class="title">Agenda Turma A</div>
  <div class="credit">desenvolvido por <b>Angelo César</b></div>
</div>

<div class="app">
  <!-- Sidebar 60px -->
  <aside class="sidebar">
    <div class="sb-logo">🚂</div>
    <button class="sb-icon active" title="Calendário" data-sec="calendario">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    </button>
    <button class="sb-icon" title="Eventos da Turma" data-sec="eventos">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    </button>
    <button class="sb-icon" title="Acervo (PDFs, fatos, memórias)" data-sec="acervo">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg>
    </button>
    <button class="sb-icon" title="Configurações" data-sec="setup">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="top-bar">
      <div class="brand">
        <div class="brand-logo" title="Vale">
          <img class="logo-light" src="/vale_symbol_color.png" alt="Vale"/>
          <img class="logo-dark" src="/vale_symbol_white.png" alt="Vale"/>
        </div>
        <div>
          <div class="brand-tit">AGENDA TURMA A</div>
          <div class="brand-sub">Escala 2x2</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="tabs" id="tabs">
          <button class="tab active" data-view="mensal">MENSAL</button>
          <button class="tab" data-view="anual">ANUAL</button>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
          <svg class="ico-sun" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg class="ico-moon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>

    <div id="content"></div>
  </main>

  <!-- Painel direito -->
  <aside class="right" id="rightPanel"></aside>
</div>

<!-- Viriato FAB -->
<button class="viriato-fab" id="viriatoBtn" aria-label="Abrir Viriato">🤖</button>
<div id="viriatoWin"></div>

<script>
// ===== Constantes =====
const FER={"2026-01-01":"Confraternizacao Universal","2026-04-03":"Paixao de Cristo","2026-04-05":"Pascoa","2026-04-21":"Tiradentes","2026-05-01":"Dia do Trabalho","2026-06-04":"Corpus Christi","2026-09-07":"Independencia do Brasil","2026-10-12":"N.Sra.Aparecida","2026-11-02":"Finados","2026-11-15":"Proclamacao da Republica","2026-11-20":"Consciencia Negra","2026-12-25":"Natal"};
const MESES=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const MESES3=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const DOW=["DOM","SEG","TER","QUA","QUI","SEX","SAB"];
const DOW_FULL=["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];
const DOW_MINI=["D","S","T","Q","Q","S","S"];

// REF: 05/04/2026 = dia de TRABALHO. Ciclo: trab,trab,folga,folga (2x2).
const REF=new Date(2026,3,5);
function toKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function isFolga(d){
  const dt=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=Math.round((dt-REF)/86400000);
  return ((diff%4)+4)%4>=2;
}

const HOJE=new Date();
const HOJE_KEY=toKey(HOJE);

// ===== Estado + LocalStorage =====
const LS_KEY="turmaA_pierre_state";
const S={
  view:"mensal",
  curMes:HOJE.getMonth(),
  curAno:HOJE.getFullYear(),
  viriatoOpen:false,
  history:[],
};
function saveLS(){
  try{
    localStorage.setItem(LS_KEY,JSON.stringify({
      view:S.view,curMes:S.curMes,curAno:S.curAno
    }));
  }catch(e){}
}
function loadLS(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return;
    const d=JSON.parse(raw);
    if(d.view)S.view=d.view;
    if(typeof d.curMes==="number")S.curMes=d.curMes;
    if(typeof d.curAno==="number")S.curAno=d.curAno;
  }catch(e){}
}
loadLS();

// ===== Cálculos =====
function diffDias(de,ate){
  const a=new Date(de.getFullYear(),de.getMonth(),de.getDate());
  const b=new Date(ate.getFullYear(),ate.getMonth(),ate.getDate());
  return Math.round((b-a)/86400000);
}
function proxData(predicate){
  for(let i=0;i<60;i++){
    const d=new Date(HOJE);d.setDate(d.getDate()+i);
    if(predicate(d))return d;
  }
  return null;
}
function calcResumoAnual(ano){
  let f=0,t=0;
  for(let m=0;m<12;m++){
    const max=new Date(ano,m+1,0).getDate();
    for(let d=1;d<=max;d++){
      const dt=new Date(ano,m,d);
      if(isFolga(dt))f++;else t++;
    }
  }
  return{f,t,total:f+t};
}

// ===== Render Mensal =====
function renderMensal(){
  const ano=S.curAno,mes=S.curMes;
  const primeiro=new Date(ano,mes,1);
  const startOffset=primeiro.getDay();
  const diasMes=new Date(ano,mes+1,0).getDate();
  const diasMesAnt=new Date(ano,mes,0).getDate();

  let html=`
    <div class="month-bar">
      <div class="month-nav">
        <button class="nav-arrow" id="prevMes" aria-label="Mês anterior">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="month-title">${MESES[mes]} ${ano}</div>
        <button class="nav-arrow" id="nextMes" aria-label="Próximo mês">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <button class="btn-hoje" id="btnHoje">HOJE</button>
    </div>
    <div class="cal-wrap">
      <div class="cal-dow">${DOW.map(d=>`<div>${d}</div>`).join("")}</div>
      <div class="cal-grid">`;

  // dias mês anterior
  for(let i=startOffset-1;i>=0;i--){
    const dnum=diasMesAnt-i;
    const dt=new Date(ano,mes-1,dnum);
    const fol=isFolga(dt);
    html+=`<div class="day outside ${fol?"folga":"trab"}"><span class="num">${dnum}</span><span class="lbl">${fol?"FOLGA":"TRAB"}</span></div>`;
  }
  // dias mês atual
  for(let d=1;d<=diasMes;d++){
    const dt=new Date(ano,mes,d);
    const k=toKey(dt);
    const fol=isFolga(dt);
    const today=k===HOJE_KEY;
    const fer=FER[k]?"fer":"";
    html+=`<div class="day ${fol?"folga":"trab"} ${today?"today":""} ${fer}" title="${FER[k]||""}"><span class="num">${d}</span><span class="lbl">${fol?"FOLGA":"TRAB"}</span></div>`;
  }
  // completar grid
  const total=startOffset+diasMes;
  const resto=(7-(total%7))%7;
  for(let i=1;i<=resto;i++){
    const dt=new Date(ano,mes+1,i);
    const fol=isFolga(dt);
    html+=`<div class="day outside ${fol?"folga":"trab"}"><span class="num">${i}</span><span class="lbl">${fol?"FOLGA":"TRAB"}</span></div>`;
  }
  html+=`</div></div>`;
  return html;
}

// ===== Render Anual =====
function renderAnual(){
  const ano=S.curAno;
  let html=`<div class="month-bar">
    <div class="month-nav">
      <button class="nav-arrow" id="prevAno" aria-label="Ano anterior">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="month-title">${ano}</div>
      <button class="nav-arrow" id="nextAno" aria-label="Próximo ano">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <button class="btn-hoje" id="btnHoje">HOJE</button>
  </div><div class="year-wrap">`;
  for(let m=0;m<12;m++){
    const primeiro=new Date(ano,m,1);
    const offset=primeiro.getDay();
    const dias=new Date(ano,m+1,0).getDate();
    let cells="";
    for(let i=0;i<offset;i++)cells+=`<div class="mini-day outside"></div>`;
    for(let d=1;d<=dias;d++){
      const dt=new Date(ano,m,d);
      const k=toKey(dt);
      const fol=isFolga(dt);
      const today=k===HOJE_KEY?"today":"";
      cells+=`<div class="mini-day ${fol?"folga":"trab"} ${today}">${d}</div>`;
    }
    html+=`<div class="mini-mes">
      <h4>${MESES3[m]}</h4>
      <div class="mini-dow">${DOW_MINI.map(x=>`<span>${x}</span>`).join("")}</div>
      <div class="mini-grid">${cells}</div>
    </div>`;
  }
  html+=`</div>`;
  return html;
}

// ===== Render Painel direito =====
function renderRight(){
  const fol=isFolga(HOJE);
  const dataStr=HOJE.getDate().toString().padStart(2,"0")+" "+MESES3[HOJE.getMonth()]+" "+HOJE.getFullYear();
  const dow=DOW_FULL[HOJE.getDay()];
  // Próximo dia de trabalho/folga (a partir de amanhã)
  const proxTrabReal=proxData(d=>toKey(d)!==HOJE_KEY && !isFolga(d));
  const proxFolga=proxData(d=>toKey(d)!==HOJE_KEY && isFolga(d));

  const ptDias=proxTrabReal?diffDias(HOJE,proxTrabReal):0;
  const pfDias=proxFolga?diffDias(HOJE,proxFolga):0;

  const resumo=calcResumoAnual(S.curAno);
  const pctF=Math.round(resumo.f/resumo.total*100);
  const pctT=100-pctF;

  return `
    <div class="panel">
      <div class="panel-tit">Status Hoje</div>
      <div class="status-row">
        <div class="status-icon ${fol?"folga":"trab"}">${fol?"🌙":"☀️"}</div>
        <div>
          <div class="status-tipo ${fol?"folga":"trab"}">${fol?"FOLGA":"TRABALHO"}</div>
          <div class="status-data">${dow} · ${dataStr}</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-tit">Próximos Eventos</div>
      <div class="event-row">
        <div class="ev-info">
          <span class="ev-tipo">Próx. Trabalho</span>
          <span class="ev-data">${proxTrabReal?proxTrabReal.getDate().toString().padStart(2,"0")+" "+MESES3[proxTrabReal.getMonth()]:"—"}</span>
        </div>
        <div class="ev-count trab">${ptDias}<small>DIAS</small></div>
      </div>
      <div class="event-row">
        <div class="ev-info">
          <span class="ev-tipo">Próx. Folga</span>
          <span class="ev-data">${proxFolga?proxFolga.getDate().toString().padStart(2,"0")+" "+MESES3[proxFolga.getMonth()]:"—"}</span>
        </div>
        <div class="ev-count folga">${pfDias}<small>DIAS</small></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-tit">Resumo ${S.curAno}</div>
      <div class="resumo-grid">
        <div class="resumo-cell t"><div class="v">${resumo.t}</div><div class="l">Trabalho</div></div>
        <div class="resumo-cell f"><div class="v">${resumo.f}</div><div class="l">Folga</div></div>
      </div>
      <div class="resumo-bar">
        <div class="b-t" style="width:${pctT}%"></div>
        <div class="b-f" style="width:${pctF}%"></div>
      </div>
      <div class="resumo-leg">
        <span>${pctT}% TRAB</span>
        <span>TOTAL ${resumo.total}</span>
        <span>${pctF}% FOLGA</span>
      </div>
    </div>
  `;
}

// ===== Render geral =====
function render(){
  const c=document.getElementById("content");
  if(S.section && S.section!=="calendario"){
    document.getElementById("rightPanel").style.display="none";
    if(S.section==="eventos")renderEventos(c);
    else if(S.section==="acervo")renderAcervo(c);
    return;
  }
  document.getElementById("rightPanel").style.display="";
  c.innerHTML=S.view==="mensal"?renderMensal():renderAnual();
  document.getElementById("rightPanel").innerHTML=renderRight();

  // tabs
  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.toggle("active",t.dataset.view===S.view);
  });

  // navegação mensal
  const pm=document.getElementById("prevMes");
  if(pm)pm.onclick=()=>{S.curMes--;if(S.curMes<0){S.curMes=11;S.curAno--;}saveLS();render();};
  const nm=document.getElementById("nextMes");
  if(nm)nm.onclick=()=>{S.curMes++;if(S.curMes>11){S.curMes=0;S.curAno++;}saveLS();render();};
  // navegação anual
  const pa=document.getElementById("prevAno");
  if(pa)pa.onclick=()=>{S.curAno--;saveLS();render();};
  const na=document.getElementById("nextAno");
  if(na)na.onclick=()=>{S.curAno++;saveLS();render();};
  // hoje
  const bh=document.getElementById("btnHoje");
  if(bh)bh.onclick=()=>{S.curMes=HOJE.getMonth();S.curAno=HOJE.getFullYear();saveLS();render();};
}

document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click",()=>{
    S.view=t.dataset.view;S.section="calendario";
    document.querySelectorAll(".sb-icon").forEach(b=>b.classList.toggle("active",b.dataset.sec==="calendario"));
    saveLS();render();
  });
});

// ===== Tema claro/escuro =====
function applyTheme(t){
  document.documentElement.setAttribute("data-theme",t);
  try{localStorage.setItem("turmaA_theme",t);}catch(e){}
}
applyTheme(localStorage.getItem("turmaA_theme")||"dark");
document.getElementById("themeToggle").addEventListener("click",()=>{
  const cur=document.documentElement.getAttribute("data-theme")||"dark";
  applyTheme(cur==="dark"?"light":"dark");
});

// ===== Viriato =====
function renderViriato(){
  const w=document.getElementById("viriatoWin");
  if(!S.viriatoOpen){w.innerHTML="";return;}
  const msgs=S.history.length?S.history:[{role:"assistant",content:"Olá! Sou o Viriato, assistente ferroviário. Como posso ajudar?"}];
  w.innerHTML=`
    <div class="viriato-win">
      <div class="vw-head">
        <div class="vw-avatar">🤖</div>
        <div>
          <div class="vw-name">VIRIATO</div>
          <div class="vw-sub">Assistente Ferroviário</div>
        </div>
        <button class="vw-close" id="vwClose" aria-label="Fechar">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="vw-body" id="vwBody">
        ${msgs.map(m=>`<div class="msg ${m.role==="user"?"user":"bot"}">${escapeHtml(m.content)}</div>`).join("")}
        ${S.viriatoTyping?'<div class="msg bot typing">Viriato digitando…</div>':""}
      </div>
      <div class="vw-input" style="position:relative">
        <button class="vw-plus" id="vwPlus" title="Anexar / opções" style="background:#161a22;border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:18px;font-weight:600">+</button>
        <input id="vwInput" type="text" placeholder="Digite sua mensagem…" autocomplete="off"/>
        <button class="vw-send" id="vwSend">➤</button>
        <div id="vwPlusPop" style="display:none;position:absolute;bottom:48px;left:8px;background:#0e1117;border:1px solid var(--border);border-radius:10px;padding:6px;z-index:5;box-shadow:0 12px 30px #000a;min-width:180px">
          <button data-act="doc" class="vp-opt">📄 Documento (PDF/DOCX)</button>
          <button data-act="temp" class="vp-opt">⏱️ Documento TEMP</button>
          <button data-act="img" class="vp-opt">🖼️ Imagem</button>
          <button data-act="cam" class="vp-opt">📷 Câmera</button>
          <button data-act="clear" class="vp-opt" style="color:#ff8a8a">🗑️ Limpar conversa</button>
        </div>
      </div>
    </div>`;
  document.getElementById("vwClose").onclick=()=>{S.viriatoOpen=false;renderViriato();};
  const inp=document.getElementById("vwInput");
  const send=document.getElementById("vwSend");
  inp.focus();
  const body=document.getElementById("vwBody");
  body.scrollTop=body.scrollHeight;
  const doSend=async()=>{
    const txt=inp.value.trim();
    if(!txt||S.viriatoTyping)return;
    S.history.push({role:"user",content:txt});
    inp.value="";
    S.viriatoTyping=true;
    renderViriato();
    try{
      const token=localStorage.getItem("turmaA_authToken")||"";
      const headers={"Content-Type":"application/json"};
      if(token)headers["Authorization"]="Bearer "+token;
      const conversation_history=S.history.slice(0,-1).map(m=>({role:m.role,content:m.content}));
      const messages=conversation_history.concat([{role:"user",content:txt}]);
      const r=await fetch("/api/claude",{
        method:"POST",
        headers,
        body:JSON.stringify({
          message:txt,
          conversation_history,
          messages
        })
      });
      if(r.status===401){
        localStorage.removeItem("turmaA_authToken");
        S.history.push({role:"assistant",content:"Sessão expirada. Faça login no app para continuar nossa conversa."});
      }else{
        const d=await r.json();
        const reply=d.text||d.reply||d.error||"Sem resposta.";
        S.history.push({role:"assistant",content:reply});
        if(d.memoria_salva && d.memoria_salva.length){
          showToast("✅ "+d.memoria_salva.length+" item(s) salvo(s) na memória");
        }
      }
    }catch(e){
      S.history.push({role:"assistant",content:"Erro de conexão: "+e.message});
    }
    S.viriatoTyping=false;
    renderViriato();
  };
  send.onclick=doSend;
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")doSend();});
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}

document.getElementById("viriatoBtn").addEventListener("click",()=>{
  S.viriatoOpen=!S.viriatoOpen;renderViriato();
});

// ----- toast -----
function showToast(msg,ms=3500){
  const t=document.createElement("div");t.className="toast";t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity="0";t.style.transition="opacity .3s";setTimeout(()=>t.remove(),300);},ms);
}

// ----- auth helpers -----
function getToken(){return localStorage.getItem("turmaA_authToken")||"";}
function setToken(t){if(t)localStorage.setItem("turmaA_authToken",t);else localStorage.removeItem("turmaA_authToken");}
let CURRENT_USER=null;
async function apiFetch(path,opts={}){
  const headers=Object.assign({},opts.headers||{});
  const t=getToken();
  if(t)headers["Authorization"]="Bearer "+t;
  if(opts.body && !headers["Content-Type"])headers["Content-Type"]="application/json";
  const r=await fetch(path,Object.assign({},opts,{headers}));
  if(r.status===401){setToken("");CURRENT_USER=null;openLogin();throw new Error("auth");}
  return r;
}
async function loadMe(){
  if(!getToken())return null;
  try{
    const r=await fetch("/api/auth/me",{headers:{"Authorization":"Bearer "+getToken()}});
    if(r.ok){
      const d=await r.json();
      if(d && d.authenticated===false){setToken("");CURRENT_USER=null;return null;}
      CURRENT_USER=d.user||d;return CURRENT_USER;
    }
  }catch(e){}
  setToken("");CURRENT_USER=null;return null;
}

// ----- modal genérico -----
function openModal(title,bodyHtml,onMount){
  closeModal();
  const m=document.createElement("div");
  m.id="appModal";

function openLogin(){
  openModal("Entrar",`
    <div class="modal-fld"><label>Matrícula (6 a 10 dígitos)</label><input id="loginMat" inputmode="numeric" maxlength="10" autocomplete="username"/></div>
    <div class="modal-fld"><label>Senha (4 dígitos)</label><input id="loginSen" type="password" inputmode="numeric" maxlength="4" autocomplete="current-password"/></div>

      Não tem conta? <a href="#" id="goReg" style="color:var(--neon)">Cadastrar-se</a>
    </div>
  `,()=>{
    const go=async()=>{
      const m=document.getElementById("loginMat").value.trim();
      const s=document.getElementById("loginSen").value.trim();
      const msg=document.getElementById("loginMsg");
      msg.textContent="Entrando...";
      try{
        const r=await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({matricula:m,senha:s})});
        const d=await r.json();
        if(r.ok && d.token){setToken(d.token);CURRENT_USER=d.user||null;closeModal();showToast("✅ Bem-vindo, "+(CURRENT_USER&&CURRENT_USER.nome||"colega"));}
        else msg.textContent=d.error||"Falha no login";
      }catch(e){msg.textContent="Erro: "+e.message;}
    };
    document.getElementById("loginBtn").onclick=go;
    document.getElementById("loginSen").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
    document.getElementById("loginMat").focus();
    document.getElementById("goReg").onclick=e=>{e.preventDefault();openRegistro();};
  });
}

async function requireAuth(){
  if(!getToken()){openLogin();return false;}
  if(!CURRENT_USER){await loadMe();}
  if(!CURRENT_USER){openLogin();return false;}
  return true;
}

async function renderEventos(c){
  c.innerHTML=`<div class="pg-head"><div class="pg-tit">📅 EVENTOS DA TURMA</div><button id="evNew" class="btn-primary">+ NOVO EVENTO</button></div><div class="pg-body" id="evBody"><div style="color:var(--muted)">Carregando...</div></div>`;
  document.getElementById("evNew").onclick=()=>openEventoForm();
  if(!await requireAuth()){document.getElementById("evBody").innerHTML='<div style="color:var(--muted);padding:20px;text-align:center">Faça login para ver os eventos.</div>';return;}
  try{
    const r=await apiFetch("/api/mem/eventos");
    const d=await r.json();
    const evs=(d.eventos||[]).slice().sort((a,b)=>(a.data||"").localeCompare(b.data||""));
    const body=document.getElementById("evBody");
    if(!evs.length){body.innerHTML='<div style="color:var(--muted);padding:20px;text-align:center">Nenhum evento ainda. Clique em + NOVO EVENTO.</div>';return;}
    body.innerHTML=evs.map(e=>`<div class="lst-item">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:14px">${escapeHtml(e.titulo||"")}</div>
        <div style="color:var(--muted);font-size:12px;margin-top:4px">📅 ${escapeHtml(e.data||"")} ${e.hora?"· ⏰ "+escapeHtml(e.hora):""}</div>
        ${e.descricao?`<div style="margin-top:6px;color:var(--text);font-size:13px;line-height:1.5">${escapeHtml(e.descricao)}</div>`:""}
        <div style="color:var(--muted);font-size:11px;margin-top:6px">por ${escapeHtml(e.autor||"—")}</div>
      </div>
      <button class="btn-danger" data-id="${e.id}">Excluir</button>
    </div>`).join("");
    body.querySelectorAll("button.btn-danger").forEach(b=>{
      b.onclick=async()=>{
        if(!confirm("Excluir este evento?"))return;
        const novos=evs.filter(x=>x.id!=b.dataset.id);
        await apiFetch("/api/mem/eventos",{method:"POST",body:JSON.stringify({eventos:novos})});
        renderEventos(c);
      };
    });
  }catch(e){if(e.message!=="auth")document.getElementById("evBody").innerHTML='<div style="color:#ff8a8a">Erro: '+escapeHtml(e.message)+'</div>';}
}

let ACERVO_TAB="pdfs";
async function renderAcervo(c){

  const body=document.getElementById("acBody");

async function renderAcervoPdfs(el){
  el.innerHTML="Carregando...";
  const r=await apiFetch("/api/biblioteca");const d=await r.json();
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="color:var(--muted);font-size:13px">${d.total} documento(s) na biblioteca</div>
    <button id="upPdf" class="btn-primary">+ ENVIAR PDF</button>
  </div><div id="docs"></div>`;
  document.getElementById("upPdf").onclick=()=>uploadDoc(false);
  const docs=document.getElementById("docs");
  if(!d.documentos.length){docs.innerHTML='<div style="color:var(--muted);padding:20px;text-align:center">Nenhum PDF enviado ainda.</div>';return;}
  docs.innerHTML=d.documentos.map(doc=>`<div class="lst-item">
    <div style="flex:1;min-width:0">
      <div style="font-weight:600;font-size:13px">${escapeHtml(doc.nome)}</div>
      <div style="color:var(--muted);font-size:11px;margin-top:4px">[${escapeHtml(doc.categoria||"")}] · ${doc.paginas_chunks} trechos · ${escapeHtml(doc.data_envio||"")}</div>
      ${doc.resumo?`<div style="font-size:12px;margin-top:6px;color:var(--text);opacity:.85">${escapeHtml(doc.resumo)}</div>`:""}
    </div>
    <button class="btn-danger" data-id="${escapeHtml(doc.id)}">Excluir</button>
  </div>`).join("");
  docs.querySelectorAll("button.btn-danger").forEach(b=>{
    b.onclick=async()=>{if(!confirm("Excluir este documento? Os trechos não estarão mais disponíveis para o Viriato."))return;await apiFetch("/api/biblioteca/"+encodeURIComponent(b.dataset.id),{method:"DELETE"});showToast("Documento excluído");renderAcervoPdfs(el);};
  });
}
function uploadDoc(isTemp){
  const inp=document.createElement("input");inp.type="file";inp.accept=".pdf,.docx,.txt";
  inp.onchange=async()=>{
    const f=inp.files&&inp.files[0];if(!f)return;
    if(f.size>10*1024*1024){showToast("Arquivo > 10MB");return;}
    showToast("Enviando "+f.name+"...");
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(f);});
    try{
      const r=await apiFetch("/api/biblioteca/upload",{method:"POST",body:JSON.stringify({nome:f.name,data:b64,mimetype:f.type,temp:isTemp})});
      const d=await r.json();
      if(r.ok){showToast("✅ "+f.name+" ("+d.chunks+" trechos)");if(S.section==="acervo")render();}
      else showToast("❌ "+(d.error||"falhou"));
    }catch(e){if(e.message!=="auth")showToast("Erro: "+e.message);}
  };
  inp.click();
}

            const ep=b.dataset.act==="ap"?"aprovar":"negar";
            const r=await apiFetch("/api/admin/"+ep+"/"+encodeURIComponent(b.dataset.m),{method:"POST"});
            if(r.ok){showToast(b.dataset.act==="ap"?"✅ Aprovado":"Negado");load();}
          };
        });
      }else{
        const r=await apiFetch("/api/admin/usuarios");const d=await r.json();
        const list=d.usuarios||d||[];
        p.innerHTML=list.map(u=>`<div class="lst-item"><div style="flex:1"><div style="font-weight:600">${escapeHtml(u.nome||"")}</div><div style="font-size:12px;color:var(--muted)">Mat ${escapeHtml(u.matricula||"")} · ${escapeHtml(u.role||"membro")}</div></div><div style="display:flex;gap:4px;flex-wrap:wrap">${u.role==="admin"||u.role==="aprovador"?'<button class="btn-secondary" data-act="dp" data-m="'+escapeHtml(u.matricula)+'" style="padding:4px 8px;font-size:11px">↓ Despromover</button>':'<button class="btn-secondary" data-act="pr" data-m="'+escapeHtml(u.matricula)+'" style="padding:4px 8px;font-size:11px">↑ Promover</button>'}<button class="btn-secondary" data-act="rs" data-m="${escapeHtml(u.matricula)}" style="padding:4px 8px;font-size:11px">🔑 Resetar</button></div></div>`).join("");
        p.querySelectorAll("button[data-act]").forEach(b=>{
          b.onclick=async()=>{
            const ep={pr:"promover",dp:"despromover",rs:"reset-senha"}[b.dataset.act];
            const r=await apiFetch("/api/admin/"+ep+"/"+encodeURIComponent(b.dataset.m),{method:"POST"});
            const d=await r.json();
            if(r.ok)showToast(d.mensagem||"✅ Feito");
            else showToast("❌ "+(d.error||"falhou"));
            load();
          };
        });
      }
    };
    body.querySelectorAll("#adTabs button").forEach(b=>{
      b.onclick=()=>{tab=b.dataset.t;body.querySelectorAll("#adTabs button").forEach(x=>x.classList.toggle("active",x===b));load();};
    });
    load();
  });
}

// ===== SIDEBAR ROUTER =====
function setSection(sec){
  S.section=sec;
  document.querySelectorAll(".sb-icon").forEach(b=>b.classList.toggle("active",b.dataset.sec===sec));
  render();
}
S.section=S.section||"calendario";
document.querySelectorAll(".sidebar .sb-icon").forEach(b=>{
  b.addEventListener("click",async()=>{
    const sec=b.dataset.sec;
    if(sec==="setup"){await openSetup();return;}
    if(sec!=="calendario"){if(!await requireAuth())return;}
    setSection(sec);
  });
});

// ===== VIRIATO + popover (anexa após cada renderViriato) =====
const _origRenderViriato=renderViriato;
window.renderViriato=function(){
  _origRenderViriato();
  if(window._viriatoPlusOutside){document.removeEventListener("click",window._viriatoPlusOutside,true);window._viriatoPlusOutside=null;}
  if(!S.viriatoOpen)return;
  const plus=document.getElementById("vwPlus");
  const pop=document.getElementById("vwPlusPop");
  if(!plus||!pop)return;
  plus.onclick=(e)=>{e.stopPropagation();pop.style.display=pop.style.display==="block"?"none":"block";};
  window._viriatoPlusOutside=(e)=>{if(pop && pop.style.display==="block" && !pop.contains(e.target) && e.target!==plus)pop.style.display="none";};
  document.addEventListener("click",window._viriatoPlusOutside,true);
  pop.querySelectorAll("button").forEach(b=>{
    b.onclick=async()=>{
      pop.style.display="none";
      const act=b.dataset.act;
      if(act==="doc")uploadDoc(false);
      else if(act==="temp")uploadDoc(true);
      else if(act==="img"||act==="cam"){
        const inp=document.createElement("input");inp.type="file";inp.accept="image/*";if(act==="cam")inp.capture="environment";
        inp.onchange=async()=>{const f=inp.files&&inp.files[0];if(!f)return;
          if(f.size>10*1024*1024){showToast("Imagem > 10MB");return;}
          showToast("Enviando imagem...");
          const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(f);});
          try{
            const r=await apiFetch("/api/biblioteca/upload",{method:"POST",body:JSON.stringify({nome:f.name||"camera.jpg",data:b64,mimetype:f.type||"image/jpeg",temp:true})});
            const d=await r.json();
            if(r.ok)showToast("✅ Imagem enviada ("+d.chunks+" trechos)");
            else showToast("❌ "+(d.error||"falhou"));
          }catch(e){if(e.message!=="auth")showToast("Erro: "+e.message);}
        };
        inp.click();
      }else if(act==="clear"){
        if(confirm("Limpar conversa atual?")){S.history=[];renderViriato();}
      }
    };
  });
};

// ===== Boot =====
loadMe().then(()=>{/* token validado */});

render();
</script>
