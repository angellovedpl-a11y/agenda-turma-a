<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Turma A"/>
<meta name="theme-color" content="#07090f"/>
<title>Agenda Turma A</title>
<link rel="apple-touch-icon" sizes="512x512" href="https://raw.githubusercontent.com/angellovedpl-a11y/agenda-turma-a/main/Gemini_Generated_Image_pqp90dpqp90dpqp9.png"/>
<style>
:root,[data-theme="dark"]{
  --bg:#07090f;--bg2:#0a0e1a;--hdr:#0d1120;--hdr2:#0a0d18;
  --card:#0f1628;--card2:#0c1020;--card3:#111828;
  --text:#e8edf5;--text2:#f4f6fb;--text3:#b8c4d8;
  --muted:#4a6080;--muted2:#2e4060;
  --border:#1e2d44;--border2:#162035;
  --daybg:#0d1628;--daynum:#5a7898;--wknd:#6090b8;
  --folgabg:#2a1800;--folganm:#e8a800;
  --shadow:0 4px 20px #00000088;--shadow2:0 2px 10px #00000066;
  --btn:linear-gradient(135deg,#111828,#0d1428);
  --hdrgrad:linear-gradient(180deg,#0d1120 0%,#0a0e1a 100%);
  --mesgrad:linear-gradient(180deg,#0f1628 0%,#0c1020 100%);
}
[data-theme="light"]{
  --bg:#f0f4f9;--bg2:#e8eef6;--hdr:#ffffff;--hdr2:#f8fafc;
  --card:#ffffff;--card2:#f4f7fb;--card3:#eef2f8;
  --text:#1a2535;--text2:#111827;--text3:#4a5568;
  --muted:#6b7a96;--muted2:#9aabb8;
  --border:#dde4ef;--border2:#c8d5e4;
  --daybg:#eef2f9;--daynum:#4a6080;--wknd:#1d4ed8;
  --folgabg:#fff8e0;--folganm:#b45309;
  --shadow:0 4px 20px #0000001a;--shadow2:0 2px 10px #00000011;
  --btn:linear-gradient(135deg,#f4f7fb,#e8eef6);
  --hdrgrad:linear-gradient(180deg,#ffffff 0%,#f8fafc 100%);
  --mesgrad:linear-gradient(180deg,#ffffff 0%,#f4f7fb 100%);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none;transition:background .25s,color .25s}
button,input,select,textarea{font-family:inherit;color:inherit}
#app{min-height:100vh;display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:12px 14px;background:var(--hdrgrad);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
.logo-box{width:40px;height:40px;background:linear-gradient(135deg,#e8a800,#c07800);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 14px #e8a80055;overflow:hidden}
.logo-box svg{width:32px;height:32px}
.app-title{font-size:17px;font-weight:800;color:var(--text2);letter-spacing:.3px;line-height:1.1}
.app-sub{font-size:8px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-top:1px}
.hdr-right{display:flex;gap:6px;align-items:center;margin-left:auto;flex-wrap:wrap}
.countdown{padding:5px 12px;border-radius:22px;font-size:12px;font-weight:700;white-space:nowrap;border:1px solid #e8a80055;background:linear-gradient(135deg,#1c1200,#120d00);color:#e8a800;box-shadow:0 2px 10px #e8a80022;transition:all .25s}
.countdown.folga{border-color:#22d48a55;background:linear-gradient(135deg,#002215,#001510);color:#22d48a;box-shadow:0 2px 10px #22d48a22}
[data-theme="light"] .countdown{background:linear-gradient(135deg,#fff8e0,#fef3c7)}
[data-theme="light"] .countdown.folga{background:linear-gradient(135deg,#d1fae5,#a7f3d0);color:#065f46}
.icon-btn{width:36px;height:36px;border:1px solid var(--border);border-radius:11px;background:var(--btn);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;position:relative;flex-shrink:0;transition:all .15s;box-shadow:var(--shadow2)}
.icon-btn:hover{transform:scale(1.08);border-color:#e8a80066}
.icon-btn:active{transform:scale(.92);box-shadow:none}
.alarm-dot{position:absolute;top:3px;right:3px;width:7px;height:7px;background:#22d48a;border-radius:50%;border:2px solid var(--bg);box-shadow:0 0 6px #22d48a99}
.stats-bar{display:flex;align-items:center;flex-wrap:wrap;gap:7px;padding:10px 14px;background:var(--hdr2);border-bottom:1px solid var(--border)}
.stat-box{display:flex;flex-direction:column;align-items:center;padding:7px 10px;border-radius:13px;cursor:default;transition:transform .15s}
.stat-box:hover{transform:translateY(-1px)}
.stat-icon{font-size:13px;line-height:1;margin-bottom:2px}
.stat-n{font-size:17px;font-weight:800;font-family:monospace;line-height:1}
.stat-l{font-size:8px;letter-spacing:1.2px;margin-top:1px;text-transform:uppercase;color:var(--muted)}
.nav-btns{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap}
.nav-btn{font-size:11px;padding:6px 11px;border-radius:11px;border:1px solid var(--border);background:var(--btn);color:var(--muted);cursor:pointer;font-weight:600;white-space:nowrap;transition:all .15s;box-shadow:var(--shadow2)}
.nav-btn:hover{border-color:#e8a80044;color:var(--text3)}
.nav-btn:active{transform:scale(.94)}
.nav-btn.on{background:linear-gradient(135deg,#2a1800,#1a1000);border-color:#e8a80077;color:#e8a800;box-shadow:0 3px 14px #e8a80033}
[data-theme="light"] .nav-btn.on{background:linear-gradient(135deg,#fff8e0,#fef3c7)}
.sem-bar{display:flex;align-items:center;gap:3px;padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto}
.sem-lbl{font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-right:4px;white-space:nowrap;flex-shrink:0}
.sem-day{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 2px;border-radius:11px;cursor:pointer;border:1px solid transparent;min-width:38px;transition:all .15s}
.sem-day:hover{background:var(--card3)}
.sem-day:active{transform:scale(.91)}
.sem-day.hoje-f{background:linear-gradient(135deg,#2a1800,#1a1000);border-color:#e8a80077;box-shadow:0 2px 12px #e8a80033}
.sem-day.hoje-t{background:linear-gradient(135deg,#001833,#000e24);border-color:#3b9eff66;box-shadow:0 2px 12px #3b9eff22}
[data-theme="light"] .sem-day.hoje-f{background:linear-gradient(135deg,#fff8e0,#fef3c7);border-color:#e8a80099}
[data-theme="light"] .sem-day.hoje-t{background:linear-gradient(135deg,#eff6ff,#dbeafe);border-color:#3b82f699}
.sem-dw{font-size:8px;color:var(--muted)}
.sem-dd{font-size:15px;font-weight:700;line-height:1.2}
.sem-dot{width:5px;height:5px;border-radius:50%;margin-top:2px;display:block}
.leg-bar{display:flex;align-items:center;flex-wrap:wrap;gap:7px;padding:6px 14px;background:var(--hdr2);border-bottom:1px solid var(--border)}
.leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text3)}
.leg-sq{width:9px;height:9px;border-radius:3px}
.filter-bar{display:flex;align-items:center;flex-wrap:wrap;gap:6px;padding:8px 14px;background:var(--hdr);border-bottom:1px solid var(--border)}
.ano-btn{font-size:12px;font-weight:800;padding:5px 11px;border-radius:9px;border:1px solid var(--border);background:var(--btn);color:var(--muted);cursor:pointer;font-family:monospace;position:relative;transition:all .15s;box-shadow:var(--shadow2)}
.ano-btn:hover{border-color:#e8a80044}
.ano-btn:active{transform:scale(.92)}
.ano-btn.on{background:linear-gradient(135deg,#2a1800,#1a1000);border-color:#e8a80088;color:#e8a800;box-shadow:0 2px 12px #e8a80033}
[data-theme="light"] .ano-btn.on{background:linear-gradient(135deg,#fff8e0,#fef3c7)}
.ano-dot{position:absolute;top:2px;right:2px;width:5px;height:5px;background:#c084fc;border-radius:50%;border:1px solid var(--bg)}
.mes-btn{font-size:9px;padding:4px 7px;border-radius:7px;border:1px solid var(--border);background:var(--btn);color:var(--muted);cursor:pointer;transition:all .12s}
.mes-btn:hover{border-color:#e8a80044;color:var(--text3)}
.mes-btn:active{transform:scale(.9)}
.mes-btn.on{background:linear-gradient(135deg,#2a1800,#1a1000);border-color:#e8a80066;color:#e8a800}
[data-theme="light"] .mes-btn.on{background:linear-gradient(135deg,#fff8e0,#fef3c7)}
.cal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:13px;flex:1}
.mes-passado-hint{grid-column:1/-1;display:flex;align-items:center;justify-content:center;gap:8px;padding:9px;color:var(--muted);font-size:11px;cursor:pointer;border:1px dashed var(--border2);border-radius:10px;transition:all .15s}
.mes-passado-hint:hover{border-color:#e8a80044;color:#e8a800}
.mes-card{background:var(--mesgrad);border:1px solid var(--border);border-radius:15px;padding:12px 10px;box-shadow:var(--shadow);transition:all .2s}
.mes-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px #00000055}
[data-theme="light"] .mes-card:hover{box-shadow:0 8px 28px #0000001a}
.mes-card.mes-atual{border:2px solid #e8a800!important;box-shadow:0 0 20px #e8a80077,0 4px 20px #e8a80033;background:linear-gradient(135deg,rgba(232,168,0,0.07),rgba(232,168,0,0.02))!important}
.mes-card.auditoria{border-color:#f8717166!important;box-shadow:0 4px 20px #f8717122!important}
.mes-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.mes-nome{font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:2px}
.mes-badges{display:flex;gap:4px;align-items:center}
.mes-ev-badge{font-size:8px;color:#c084fc;background:#c084fc18;border:1px solid #c084fc44;border-radius:6px;padding:2px 5px;font-family:monospace}
.mes-doc-badge{font-size:8px;color:#38bdf8;background:#38bdf818;border:1px solid #38bdf844;border-radius:6px;padding:2px 5px}
.mes-audit-badge{font-size:8px;color:#f87171;background:#f8717118;border:1px solid #f8717144;border-radius:6px;padding:2px 5px}
.cal-dsem{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid var(--border2)}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.day-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:11px;cursor:pointer;position:relative;font-weight:500;transition:transform .1s,box-shadow .1s}
.day-cell:hover{transform:scale(1.14);z-index:2}
.day-cell:active{transform:scale(1.2)}
.day-cell.auditoria-day{outline:2px solid #f8717188;outline-offset:-2px}
.day-dots{position:absolute;bottom:2px;display:flex;gap:1.5px;justify-content:center}
.day-dot{width:3px;height:3px;border-radius:50%;display:block}
.day-clip{position:absolute;top:1px;right:1px;font-size:7px;line-height:1}
.ev-pane{flex:1;padding:13px;max-width:700px;margin:0 auto;width:100%}
.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-inp{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 14px;font-size:13px;color:var(--text);box-shadow:var(--shadow2);transition:border-color .2s,box-shadow .2s}
.search-inp:focus{outline:none;border-color:#e8a80066;box-shadow:0 0 0 3px #e8a80018}
.search-inp::placeholder{color:var(--muted)}
.search-clear{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:0 4px}
.ev-sec-title{font-size:9px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:12px}
.ev-card{display:flex;gap:11px;margin-bottom:10px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;box-shadow:var(--shadow2);transition:all .15s}
.ev-card:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.ev-date-col{display:flex;flex-direction:column;align-items:center;min-width:38px;padding-right:11px;border-right:1px solid var(--border)}
.ev-dd{font-size:20px;font-weight:800;font-family:monospace;line-height:1;color:var(--text2)}
.ev-mm{font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:3px;text-transform:uppercase}
.ev-dw{font-size:8px;color:var(--muted2);margin-top:2px}
.ev-body{flex:1}
.ev-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.ev-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--border2)}
.ev-emoji{font-size:15px;flex-shrink:0}
.ev-txt{flex:1;font-size:12px;color:var(--text);border-left:2px solid #333;padding-left:8px}
.ev-actions{display:flex;gap:3px;margin-left:4px}
.ev-act-btn{background:none;border:none;cursor:pointer;font-size:11px;padding:3px 5px;color:var(--muted);border-radius:5px;transition:background .1s}
.ev-act-btn:hover{background:var(--card3)}
.ev-empty{text-align:center;padding:50px 20px;color:var(--muted);line-height:2.4;font-size:13px}
.chip{font-size:10px;border-radius:20px;padding:3px 9px;font-weight:600;white-space:nowrap;display:inline-block}
.overlay{position:fixed;inset:0;background:#000000bb;backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:20px;width:100%;max-width:430px;overflow:hidden;box-shadow:0 40px 100px #000000cc;max-height:90vh;overflow-y:auto;animation:slideUp .2s ease}
.modal-box.wide{max-width:500px}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-top{display:flex;align-items:flex-start;gap:8px;padding:16px 17px 13px;border-bottom:1px solid var(--border)}
.modal-weekday{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.modal-date-big{font-size:26px;font-weight:800;color:var(--text2);line-height:1.1}
.modal-chips{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.close-btn{background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--muted);width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:14px;transition:all .12s}
.close-btn:hover{background:var(--card3);color:var(--text)}
.close-btn:active{transform:scale(.88)}
.modal-body{padding:13px 15px 18px}
.modal-sec{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:12px 0 8px;display:flex;align-items:center;gap:6px}
.tipo-row{display:flex;gap:5px;flex-wrap:wrap;margin:10px 0 8px}
.tipo-btn{font-size:10px;border-radius:20px;padding:5px 10px;cursor:pointer;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .12s}
.tipo-btn:hover{border-color:var(--muted);color:var(--text3)}
.tipo-btn:active{transform:scale(.92)}
.add-row{display:flex;gap:7px}
.add-inp{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 13px;font-size:13px;color:var(--text);transition:border-color .2s,box-shadow .2s}
.add-inp:focus{outline:none;border-color:#e8a80066;box-shadow:0 0 0 3px #e8a80018}
.add-inp::placeholder{color:var(--muted)}
.add-btn{border:none;border-radius:12px;color:#000;font-weight:900;font-size:20px;width:44px;flex-shrink:0;cursor:pointer;transition:all .13s;box-shadow:0 3px 14px #e8a80044}
.add-btn:hover{transform:scale(1.08)}
.add-btn:active{transform:scale(.9)}
.cancel-edit{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;margin-top:5px;display:block}
/* DOCUMENTOS */
.doc-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border2)}
.doc-icon{font-size:18px;flex-shrink:0}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:12px;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{font-size:10px;color:var(--muted);margin-top:1px}
.doc-actions{display:flex;gap:3px;flex-shrink:0}
.doc-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:3px 5px;color:var(--muted);border-radius:5px;transition:background .1s}
.doc-btn:hover{background:var(--card3)}
.upload-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1px dashed var(--border);border-radius:10px;cursor:pointer;color:var(--muted);font-size:12px;transition:all .15s;background:transparent;width:100%;margin-top:8px;justify-content:center}
.upload-btn:hover{border-color:#38bdf866;color:#38bdf8}
/* AUDITORIA */
.audit-period{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px}
.audit-name{flex:1;font-size:12px;font-weight:600;color:var(--text)}
.audit-dates{font-size:10px;color:var(--muted)}
.audit-del{background:none;border:none;cursor:pointer;color:#f87171;font-size:14px;padding:2px 5px}
/* CHECKLIST */
.check-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card2);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;transition:all .15s}
.check-item.vencido{border-color:#f8717166;background:#f8717108}
.check-item.aviso{border-color:#f59e0b66;background:#f59e0b08}
.check-cb{width:18px;height:18px;accent-color:#22d48a;cursor:pointer;flex-shrink:0}
.check-info{flex:1}
.check-nome{font-size:13px;font-weight:600;color:var(--text)}
.check-val{font-size:11px;margin-top:2px}
.check-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px 5px}
.check-del:hover{color:#f87171}
/* ALARME */
.alarm-screen{position:fixed;inset:0;background:linear-gradient(180deg,#000 0%,#0a0500 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px;animation:fadeIn .3s ease}
.alarm-title{font-size:26px;font-weight:800;color:#e8a800;text-align:center}
.alarm-sub{font-size:15px;color:#94a3b8;margin-top:-12px}
.alarm-dismiss{background:linear-gradient(135deg,#22d48a,#16a067);border:none;border-radius:16px;color:#000;font-weight:800;font-size:17px;padding:16px 42px;cursor:pointer;box-shadow:0 6px 24px #22d48a55;transition:all .15s}
.alarm-dismiss:active{transform:scale(.93)}
.alarm-snooze{background:transparent;border:1px solid #e8a80066;border-radius:13px;color:#e8a800;font-weight:600;font-size:14px;padding:12px 30px;cursor:pointer;box-shadow:0 2px 10px #e8a80022;transition:all .15s}
.alarm-snooze:active{transform:scale(.93)}
.alarm-time-inp{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 16px;font-size:24px;font-weight:700;color:#e8a800;font-family:monospace;text-align:center;margin-bottom:16px;transition:border-color .2s}
.alarm-time-inp:focus{outline:none;border-color:#e8a80066;box-shadow:0 0 0 3px #e8a80018}
.alarm-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:13px;border:1px solid var(--border);margin-bottom:14px;transition:all .2s}
.alarm-toggle-btn{border:none;border-radius:10px;font-weight:700;font-size:12px;padding:8px 16px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow2)}
.alarm-toggle-btn:active{transform:scale(.93)}
.install-tip{background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:13px 14px;font-size:11px;color:var(--muted);line-height:2}
/* TREM MASCOTE */
.train-fab{position:fixed;bottom:20px;right:16px;z-index:90;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#e8a800,#c07800);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px #e8a80066;transition:transform .2s,box-shadow .2s;animation:trainBounce 3s ease-in-out infinite}
.train-fab:hover{transform:scale(1.1)!important;box-shadow:0 6px 28px #e8a80099;animation:none}
.train-fab:active{transform:scale(.92)!important}
@keyframes trainBounce{0%,100%{transform:rotate(-3deg) translateY(0)}25%{transform:rotate(2deg) translateY(-4px)}50%{transform:rotate(-2deg) translateY(0)}75%{transform:rotate(3deg) translateY(-2px)}}
.train-fab svg{width:36px;height:36px}

const TIPOS=[{id:"aniversario",label:"Aniversario",emoji:"\uD83C\uDF82",cor:"#f472b6"},{id:"medico",label:"Medico",emoji:"\uD83C\uDFE5",cor:"#f87171"},{id:"viagem",label:"Viagem",emoji:"\u2708",cor:"#38bdf8"},{id:"compromisso",label:"Compromisso",emoji:"\uD83D\uDCCB",cor:"#fb923c"},{id:"horaextra",label:"Hora Extra",emoji:"\u23F0",cor:"#a3e635"},{id:"outro",label:"Outro",emoji:"\u2B50",cor:"#c084fc"}];
const TMAP={};TIPOS.forEach(t=>TMAP[t.id]=t);

const DOCS_OBRIGATORIOS_DEFAULT=[{id:"cnh",nome:"CNH",validade:"",ok:false},{id:"aso",nome:"ASO - Atestado de Saude Ocupacional",validade:"",ok:false},{id:"cert",nome:"Certificado de Maquinista",validade:"",ok:false},{id:"nr11",nome:"Curso NR-11",validade:"",ok:false},{id:"hab",nome:"Habilitacao Ferroviaria",validade:"",ok:false}];

const REF=new Date(2026,3,8);
function isFolga(d){const dt=new Date(d.getFullYear(),d.getMonth(),d.getDate());return((Math.round((dt-REF)/86400000)%4)+4)%4<2;}
function toKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
const HOJE_DT=new Date(),HOJE_KEY=toKey(HOJE_DT),HOJE_MES=HOJE_DT.getMonth(),HOJE_ANO=HOJE_DT.getFullYear();

function diasParaFolga(){if(isFolga(HOJE_DT))return 0;for(let i=1;i<=4;i++){const d=new Date(HOJE_DT);d.setDate(d.getDate()+i);if(isFolga(d))return i;}return 1;}
function calcStats(ano){let f=0,t=0,h=0;for(let m=0;m<12;m++){const max=new Date(ano,m+1,0).getDate();for(let d=1;d<=max;d++){const dt=new Date(ano,m,d),k=toKey(dt);if(FER[k])h++;if(isFolga(dt))f++;else t++;}}return{f,t,h};}
function getSemana(){const dias=[],ini=new Date(HOJE_DT);ini.setDate(ini.getDate()-ini.getDay());for(let i=0;i<7;i++){const d=new Date(ini);d.setDate(ini.getDate()+i);dias.push(d);}return dias;}
function getEvText(ev){return typeof ev==="string"?ev:(ev&&ev.txt)||"";}
function getEvTipo(ev){return typeof ev==="string"?"outro":(ev&&ev.tipo)||"outro";}
function totalEvents(){return Object.keys(S.events).reduce((a,k)=>a+((S.events[k]&&S.events[k].length)||0),0);}
function totalDocs(){return Object.keys(S.docs).reduce((a,k)=>a+((S.docs[k]&&S.docs[k].length)||0),0);}
function isInAuditoria(dateKey){return S.auditorias.some(a=>dateKey>=a.inicio&&dateKey<=a.fim);}
function docIcon(type){if(!type)return "\uD83D\uDCCE";if(type.includes("pdf"))return "\uD83D\uDCC4";if(type.includes("word")||type.includes("doc"))return "\uD83D\uDCDD";if(type.includes("image")||type.includes("jpg")||type.includes("png"))return "\uD83D\uDDBC";return "\uD83D\uDCCE";}
function formatBytes(b){if(b<1024)return b+"B";if(b<1048576)return (b/1024).toFixed(1)+"KB";return (b/1048576).toFixed(1)+"MB";}
function diasParaVencer(validade){if(!validade)return null;const v=new Date(validade),hoje=new Date(HOJE_DT);hoje.setHours(0,0,0,0);v.setHours(0,0,0,0);return Math.round((v-hoje)/86400000);}

/* CHECKLIST ALERT */
function checklistAlert(){
  for(const item of S.checklist){
    if(!item.validade)continue;
    const d=diasParaVencer(item.validade);
    if(d!==null&&d<=30)return{nome:item.nome,dias:d};
  }return null;}

/* TREM MSG */
function trainMsg(){
  const k=HOJE_KEY,fol=isFolga(HOJE_DT),evs=S.events[k]||[],fer=FER[k];
  const audit=isInAuditoria(k);
  const docAlert=checklistAlert();
  if(audit)return "Atencao maquinista! Periodo de auditoria. Documentos em dia? \uD83D\uDCCB";
  if(docAlert&&docAlert.dias<=0)return "Seu "+docAlert.nome+" esta VENCIDO! Providencie a renovacao! \u26A0\uFE0F";
  if(docAlert&&docAlert.dias<=30)return "Maquinista, seu "+docAlert.nome+" vence em "+docAlert.dias+" dia(s)! \u23F3";
  if(evs.length>0)return "Voce tem "+evs.length+" evento(s) hoje! "+(TMAP[getEvTipo(evs[0])]?.emoji||"\u2B50");
  if(fer)return "Feriado hoje: "+fer+"! \uD83C\uDF89";

  const amanha=new Date(HOJE_DT);amanha.setDate(amanha.getDate()+1);
  if(!isFolga(amanha))return "Bom turno! Seguranca em primeiro lugar! \uD83D\uDEA8";
  return "Amanha e dia de servico. Descanse bem! \uD83D\uDE34";
}

/* ALARME */
let alarmCtx=null,alarmNodes=[],alarmInterval=null;
function tocarAlarme(){stopAlarme();try{alarmCtx=new(window.AudioContext||window.webkitAudioContext)();function beep(t,f,d){const o=alarmCtx.createOscillator(),g=alarmCtx.createGain();o.connect(g);g.connect(alarmCtx.destination);o.type="sine";o.frequency.value=f;g.gain.setValueAtTime(0.5,t);g.gain.exponentialRampToValueAtTime(0.001,t+d);o.start(t);o.stop(t+d+.05);alarmNodes.push(o);}const t=alarmCtx.currentTime;for(let i=0;i<8;i++){beep(t+i*.45,880,.35);beep(t+i*.45+.15,1100,.2);}alarmInterval=setInterval(()=>{if(!alarmCtx)return;const t2=alarmCtx.currentTime;for(let i=0;i<8;i++){beep(t2+i*.45,880,.35);beep(t2+i*.45+.15,1100,.2);}},4000);}catch(e){}}
function stopAlarme(){if(alarmInterval){clearInterval(alarmInterval);alarmInterval=null;}alarmNodes.forEach(n=>{try{n.stop();}catch(e){}});alarmNodes=[];if(alarmCtx){try{alarmCtx.close();}catch(e){}alarmCtx=null;}}
setInterval(()=>{const now=new Date();const h=now.getHours();const min=now.getMinutes();const sec=now.getSeconds();if(sec>10)return;if((h===6&&min===0)||(h===14&&min===0)){const y=now.getFullYear();const m=now.getMonth()+1;const d=now.getDate();const key=y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');const evs=S.events[key]||[];const isServico=evs.some(e=>e.tipo==='servico');if(isServico&&'Notification'in window){if(Notification.permission==='granted'){new Notification('Ã°ÂÂÂ Turma A',{body:'NÃÂ£o esqueÃÂ§a do Prontos!',icon:'https://raw.githubusercontent.com/angellovedpl-a11y/agenda-turma-a/main/Gemini_Generated_Image_pqp90dpqp90dpqp9.png'});}else if(Notification.permission!=='denied'){Notification.requestPermission().then(p=>{if(p==='granted')new Notification('Ã°ÂÂÂ Turma A',{body:'NÃÂ£o esqueÃÂ§a do Prontos!',icon:'https://raw.githubusercontent.com/angellovedpl-a11y/agenda-turma-a/main/Gemini_Generated_Image_pqp90dpqp90dpqp9.png'});});}}}},10000);
setInterval(()=>{if(!S.alarmOn||S.alarmRinging)return;const now=new Date();const hm=String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");const alvo=S.snoozeTime||S.alarmTime;if(hm===alvo&&!isFolga(now)){S.alarmRinging=true;S.snoozeTime=null;tocarAlarme();render();}},30000);

/* STATE */
const S={events:{},docs:{},auditorias:[],checklist:[...DOCS_OBRIGATORIOS_DEFAULT],
  anoAtivo:HOJE_ANO,mesAtivo:null,tela:"cal",dark:true,
  modal:null,modalInput:"",modalTipo:"outro",modalEdit:null,
  alarmOn:false,alarmTime:"05:30",alarmRinging:false,snoozeTime:null,
  showAlarmModal:false,showAuditoriaModal:false,showChecklistModal:false,
  busca:"",toast:null,toastTimer:null,mostrarPassados:false,showTrain:false,
  trainTimer:null,
  newAuditNome:"",newAuditIni:"",newAuditFim:"",
  novoCheckNome:"",novoCheckVal:"",
  fileCallback:null,
  docViewer:null,
  viriatoOpen:false,
  viriatoMsgs:[{role:"assistant",txt:"OlÃ¡! Meu nome Ã© Viriato ð¤\nSou seu assistente ferroviÃ¡rio. Pode me perguntar qualquer coisa sobre sua escala, feriados ou agenda!"}],
  viriatoInput:"",
  viriatoLoading:false,
  viriatoApiKey:""
};

function loadS(){
  try{const vk=localStorage.getItem("viriatoKey");if(vk)S.viriatoApiKey=vk;}catch(e){}
  try{const r=localStorage.getItem("turmaA_v10");if(r){const d=JSON.parse(r);
    S.events=d.events||{};S.docs=d.docs||{};
    S.auditorias=d.auditorias||[];
    S.checklist=d.checklist||(JSON.parse(JSON.stringify(DOCS_OBRIGATORIOS_DEFAULT)));
    S.alarmOn=d.alarmOn||false;S.alarmTime=d.alarmTime||"05:30";S.dark=d.dark!==undefined?d.dark:true;
  }}catch(e){}
  applyTheme();
}
function saveS(){try{localStorage.setItem("turmaA_v10",JSON.stringify({events:S.events,docs:S.docs,auditorias:S.auditorias,checklist:S.checklist,alarmOn:S.alarmOn,alarmTime:S.alarmTime,dark:S.dark}));}catch(e){}}
function applyTheme(){document.documentElement.setAttribute("data-theme",S.dark?"dark":"light");document.body.style.background=S.dark?"#07090f":"#f0f4f9";}
function showToast(msg,ok=true){if(S.toastTimer)clearTimeout(S.toastTimer);S.toast={msg,ok};S.toastTimer=setTimeout(()=>{S.toast=null;render();},2600);render();}

/* RENDER PRINCIPAL */
function render(){
  applyTheme();
  const app=document.getElementById("app");
  const wm=app.querySelector(".watermark");
  app.innerHTML="";if(wm)app.appendChild(wm);
  if(S.alarmRinging){app.appendChild(renderAlarmScreen());return;}
  app.appendChild(renderHeader());
  app.appendChild(renderStats());
  app.appendChild(renderSemana());
  app.appendChild(renderLegenda());
  app.appendChild(renderFiltros());
  if(S.tela==="cal")app.appendChild(renderCalendario());
  else if(S.tela==="ev")app.appendChild(renderEventos());
  app.appendChild(renderViriatoFab());
  if(S.viriatoOpen)app.appendChild(renderViriatoModal());
  if(S.docViewer)app.appendChild(renderDocViewer());
  if(S.modal)app.appendChild(renderModal());
  if(S.showAlarmModal)app.appendChild(renderAlarmModal());
  if(S.showAuditoriaModal)app.appendChild(renderAuditoriaModal());
  if(S.showChecklistModal)app.appendChild(renderChecklistModal());
  if(S.toast)app.appendChild(renderToast());
}

function renderAlarmScreen(){
  return el("div",{class:"alarm-screen"},[
    el("div",{style:{fontSize:"72px",animation:"pulse 1s infinite"}},"\u23F0"),
    el("div",{class:"alarm-title"},"Hora do Servico!"),
    el("div",{class:"alarm-sub"},"Bom dia, Angelo! \uD83D\uDE04"),
    el("button",{class:"alarm-dismiss",onClick:()=>{stopAlarme();S.alarmRinging=false;render();}},"DISPENSAR"),
    el("button",{class:"alarm-snooze",onClick:()=>{stopAlarme();S.alarmRinging=false;const sn=new Date();sn.setMinutes(sn.getMinutes()+10);S.snoozeTime=String(sn.getHours()).padStart(2,"0")+":"+String(sn.getMinutes()).padStart(2,"0");showToast("Soneca: +10 min \uD83D\uDE34");}},"+10 min Soneca")
  ]);
}

function renderHeader(){
  const df=diasParaFolga();

function triggerUpload(key){

function mdToHtml(txt){
  if(!txt)return"";
  return txt
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    .replace(/`(.+?)`/g,"<code style='background:var(--card2);padding:1px 5px;border-radius:4px;font-size:11px;font-family:monospace'>$1</code>")
    .replace(/^### (.+)$/gm,"<b style='color:var(--text2);font-size:13px;display:block;margin-top:8px'>$1</b>")
    .replace(/^## (.+)$/gm,"<b style='color:#4ade80;font-size:14px;display:block;margin-top:8px'>$1</b>")
    .replace(/^# (.+)$/gm,"<b style='color:#4ade80;font-size:16px;display:block;margin-top:6px'>$1</b>")
    .replace(/^- (.+)$/gm,"<div style='margin-left:10px'>• $1</div>")
    .replace(/\n/g,"<br>");
}

    "Você é **Viriato**, um assistente de inteligência artificial avançado e de propósito geral, integrado ao app Agenda Turma A.",
    "Você é capaz de responder QUALQUER pergunta do usuário com profundidade: ciência, tecnologia, saúde, direito, história, matemática, programação, receitas, idiomas, esportes, cultura, filosofia, finanças, e tudo mais.",

    "- Para perguntas sobre a agenda, use o contexto abaixo",
    "",
    viriatoContexto()
  ].join("\n");
  const history=S.viriatoMsgs.slice(-20).map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.txt}]}));
  try{
    const body={
      system_instruction:{parts:[{text:systemPrompt}]},
      contents:history,
      generationConfig:{temperature:0.85,topK:40,topP:0.95,maxOutputTokens:2048}
    };
    const resp=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+apiKey,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const data=await resp.json();

      const respTxt=data.candidates[0].content.parts.map(p=>p.text||"").join("");
      S.viriatoMsgs.push({role:"assistant",txt:respTxt,html:true});
    } else {
      S.viriatoMsgs.push({role:"assistant",txt:"Erro: "+(data.error?data.error.message:JSON.stringify(data).substring(0,150))});
    }
  }catch(e){
    S.viriatoMsgs.push({role:"assistant",txt:"Erro de conexão: "+e.message});
  }
  S.viriatoLoading=false;render();
  setTimeout(()=>{const chat=document.getElementById("viriato-chat");if(chat)chat.scrollTop=chat.scrollHeight;},80);
}
